<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>寻龙雷达 - 调试版</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gradient-to-br from-purple-600 to-indigo-600 min-h-screen p-4">
    <div class="max-w-lg mx-auto">
        <!-- 测试状态 -->
        <div id="status" class="bg-white rounded-xl p-4 mb-4 shadow-lg">
            <h2 class="font-bold text-lg mb-2">🔍 加载状态</h2>
            <div id="status-content" class="text-sm text-gray-600">初始化中...</div>
        </div>
        
        <!-- 今日详情 -->
        <div id="today" class="bg-white rounded-xl p-4 shadow-lg" style="display:none;">
            <h2 class="font-bold text-lg mb-4">📰 今日详情</h2>
            <div id="companies-list"></div>
        </div>
        
        <!-- 错误信息 -->
        <div id="error" class="bg-red-50 border border-red-200 rounded-xl p-4 shadow-lg" style="display:none;">
            <h2 class="font-bold text-lg mb-2 text-red-600">🚨 错误</h2>
            <div id="error-content" class="text-red-600 text-sm"></div>
        </div>
    </div>
    
    <script>
        const statusEl = document.getElementById('status-content');
        const todayEl = document.getElementById('today');
        const errorEl = document.getElementById('error');
        const errorContent = document.getElementById('error-content');
        const companiesList = document.getElementById('companies-list');
        
        function log(msg) {
            statusEl.innerHTML += '<div>✅ ' + msg + '</div>';
            console.log(msg);
        }
        
        function showError(msg) {
            errorContent.textContent = msg;
            errorEl.style.display = 'block';
            console.error(msg);
        }
        
        // 测试 1: 检查 manifest
        log('1. 加载 manifest.json...');
        fetch('data/manifest.json?t=' + Date.now())
            .then(r => {
                if (!r.ok) throw new Error('HTTP ' + r.status);
                return r.json();
            })
            .then(manifest => {
                log('manifest 加载成功');
                log('今日：' + manifest.today);
                log('企业数：' + manifest.summary.today.total_companies);
                
                // 测试 2: 加载每日数据
                log('2. 加载每日数据...');
                return fetch('data/daily/' + manifest.today + '.json?t=' + Date.now())
                    .then(r => {
                        if (!r.ok) throw new Error('HTTP ' + r.status);
                        return r.json();
                    })
                    .then(daily => {
                        log('每日数据加载成功');
                        log('targets 数量：' + (daily.targets ? daily.targets.length : 0));
                        
                        if (!daily.targets || daily.targets.length === 0) {
                            throw new Error('targets 为空');
                        }
                        
                        // 渲染企业列表
                        renderCompanies(daily.targets);
                    });
            })
            .catch(e => {
                showError(e.message);
            });
        
        function renderCompanies(companies) {
            todayEl.style.display = 'block';
            
            companies.forEach((c, i) => {
                const card = document.createElement('div');
                card.className = 'border rounded-lg p-3 mb-2 hover:shadow-md transition';
                card.innerHTML = `
                    <div class="flex justify-between items-start">
                        <div>
                            <div class="font-bold">${i + 1}. ${c.company}</div>
                            <div class="text-xs text-gray-500 mt-1">${c.sector} | ${c.location}</div>
                            <div class="text-xs text-gray-500 mt-1">💰 ${c.financing || '-'}</div>
                            ${c.link ? '<div class="text-xs text-blue-500 mt-1">📎 有链接</div>' : ''}
                        </div>
                        <div class="text-right">
                            <div class="text-2xl font-bold ${c.score >= 80 ? 'text-red-500' : 'text-orange-500'}">${c.score}</div>
                            <div class="text-xs text-gray-400">分</div>
                            ${c.link ? `<a href="${c.link}" target="_blank" class="text-xs bg-blue-500 text-white px-2 py-1 rounded mt-2 inline-block">阅读原文</a>` : ''}
                        </div>
                    </div>
                `;
                
                // 整卡点击
                if (c.link) {
                    card.style.cursor = 'pointer';
                    card.onclick = (e) => {
                        if (e.target.tagName !== 'A') {
                            window.open(c.link, '_blank');
                        }
                    };
                }
                
                companiesList.appendChild(card);
            });
            
            log('渲染完成：' + companies.length + ' 家企业');
        }
    </script>
</body>
</html>
