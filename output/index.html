<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>寻龙雷达 - 杭州未来"六小龙"发现系统</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: -apple-system, "PingFang SC", "Helvetica Neue", sans-serif; 
            max-width: 100%;
            margin: 0 auto; 
            padding: 0;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
        }
        .container {
            background: white;
            border-radius: 0;
            padding: 20px 16px;
            box-shadow: none;
            max-width: 100%;
        }
        .header { 
            text-align: center; 
            padding: 20px 0; 
            border-bottom: 1px solid #f0f0f0;
            margin-bottom: 20px;
        }
        .header h1 { 
            color: #333; 
            font-size: 18px; 
            margin-bottom: 6px;
            font-weight: 600;
        }
        .header .date { color: #999; font-size: 12px; }
        .stats { 
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px; 
            margin-top: 15px; 
        }
        .stat-item { text-align: center; background: #f8f9fa; padding: 12px 8px; border-radius: 10px; }
        .stat-number { font-size: 22px; font-weight: bold; color: #FF6B35; }
        .stat-label { font-size: 11px; color: #999; margin-top: 4px; line-height: 1.2; }
        
        /* 今日概览卡片 */
        .today-card {
            background: linear-gradient(135deg, #FF6B35, #ff8f66);
            color: white;
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 24px;
        }
        .today-label {
            font-size: 12px;
            opacity: 0.9;
            margin-bottom: 8px;
        }
        .today-date {
            font-size: 28px;
            font-weight: 800;
            margin-bottom: 16px;
        }
        .today-stats {
            display: flex;
            gap: 24px;
        }
        .stat {
            text-align: center;
        }
        .stat-number {
            font-size: 32px;
            font-weight: 800;
        }
        .stat-label {
            font-size: 12px;
            opacity: 0.9;
            margin-top: 4px;
        }
        
        /* 导航卡片 */
        .nav-section {
            margin-bottom: 24px;
        }
        .nav-section-title {
            font-size: 14px;
            color: #666;
            margin-bottom: 12px;
            font-weight: 600;
        }
        .nav-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
        }
        .nav-card {
            background: #f8f9fa;
            border-radius: 12px;
            padding: 16px;
            text-decoration: none;
            color: #333;
            transition: transform 0.2s;
        }
        .nav-card:hover {
            transform: translateY(-2px);
            background: #e9ecef;
        }
        .nav-card-icon {
            font-size: 24px;
            margin-bottom: 8px;
        }
        .nav-card-title {
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 4px;
        }
        .nav-card-desc {
            font-size: 12px;
            color: #999;
        }
        .nav-card.badge {
            position: relative;
        }
        .nav-card.badge::after {
            content: 'NEW';
            position: absolute;
            top: 8px;
            right: 8px;
            background: #ff4757;
            color: white;
            font-size: 10px;
            padding: 2px 6px;
            border-radius: 4px;
            font-weight: 600;
        }
        
        /* TOP 企业 */
        .top-section {
            margin-bottom: 24px;
        }
        .top-title {
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 16px;
            color: #333;
        }
        .company-card {
            background: #f8f9fa;
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .rank {
            font-size: 24px;
            font-weight: 800;
            min-width: 32px;
        }
        .company-info {
            flex: 1;
        }
        .company-name {
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 4px;
            color: #333;
        }
        .company-meta {
            font-size: 12px;
            color: #999;
        }
        
        /* 企业卡片 */
        .card { 
            border-radius: 12px; 
            padding: 16px; 
            margin-bottom: 16px; 
            background: #fff;
            border: 1px solid #e8e8e8;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
        }
        .card.negative {
            background: #fff5f5;
            border-color: #feb2b2;
        }
        
        /* 卡片头部 */
        .card-header {
            display: flex;
            align-items: flex-start;
            gap: 10px;
            margin-bottom: 12px;
        }
        .card-number {
            background: linear-gradient(135deg, #FF6B35, #ff8f66);
            color: white;
            width: 28px;
            height: 28px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 13px;
            flex-shrink: 0;
        }
        .card-title { 
            font-size: 13px; 
            color: #666;
            line-height: 1.4;
            flex: 1;
        }
        
        /* 企业名称 - 最醒目 */
        .company-name { 
            font-size: 17px; 
            font-weight: 700; 
            color: #1a1a1a;
            margin: 12px 0;
            display: flex;
            align-items: flex-start;
            gap: 6px;
            line-height: 1.3;
        }
        .company-name .icon { font-size: 18px; flex-shrink: 0; }
        .company-name .score-badge { 
            background: linear-gradient(135deg, #FF6B35, #ff8f66);
            color: white;
            font-size: 11px; 
            padding: 3px 8px; 
            border-radius: 12px;
            white-space: nowrap;
            font-weight: 600;
        }
        
        /* 事件标签 */
        .event-tag {
            display: inline-block;
            padding: 5px 12px;
            border-radius: 16px;
            font-size: 12px;
            font-weight: 600;
            margin-bottom: 12px;
        }
        .event-funding { background: linear-gradient(135deg, #f093fb, #f5576c); color: white; }
        .event-relocation { background: linear-gradient(135deg, #4facfe, #00f2fe); color: white; }
        .event-expansion { background: linear-gradient(135deg, #43e97b, #38f9d7); color: white; }
        .event-ipo { background: linear-gradient(135deg, #fa709a, #fee140); color: white; }
        .event-other { background: linear-gradient(135deg, #a8edea, #fed6e3); color: #333; }
        
        /* 信息网格 */
        .info-grid { 
            display: grid; 
            grid-template-columns: repeat(2, 1fr); 
            gap: 10px;
            background: #f8f9fa;
            padding: 12px;
            border-radius: 10px;
            margin-bottom: 12px;
        }
        .info-item { display: flex; flex-direction: column; gap: 3px; }
        .info-label { font-size: 10px; color: #999; text-transform: uppercase; }
        .info-value { font-size: 12px; color: #333; font-weight: 500; line-height: 1.3; }
        
        /* 爱企查按钮 */
        .search-link { 
            display: inline-block; 
            background: linear-gradient(135deg, #667eea, #764ba2); 
            color: white; 
            padding: 10px 18px; 
            border-radius: 8px; 
            text-decoration: none; 
            font-size: 14px; 
            font-weight: 500;
            margin-bottom: 12px;
            width: 100%;
            text-align: center;
        }
        
        /* 小贾洞察 */
        .insight-box {
            background: linear-gradient(135deg, #f0f7ff, #e8f4f8);
            border-left: 3px solid #2196F3;
            padding: 12px;
            border-radius: 8px;
            margin: 12px 0;
        }
        .insight-title {
            font-size: 12px;
            font-weight: 600;
            color: #1976D2;
            margin-bottom: 6px;
            display: flex;
            align-items: center;
            gap: 5px;
        }
        .insight-content {
            font-size: 12px;
            color: #555;
            line-height: 1.6;
        }
        
        /* 卡片底部 */
        .card-footer { 
            display: flex; 
            justify-content: space-between; 
            align-items: center;
            padding-top: 12px; 
            border-top: 1px solid #f0f0f0; 
            margin-top: 12px;
            font-size: 11px;
        }
        .card-footer .source { color: #999; }
        .card-footer a { 
            color: #667eea; 
            text-decoration: none; 
            font-weight: 600;
        }
        
        /* 页脚 */
        .footer {
            text-align: center;
            padding: 20px 0;
            border-top: 1px solid #f0f0f0;
            margin-top: 20px;
        }
        .footer p {
            font-size: 12px;
            color: #999;
            margin: 4px 0;
        }
        .last-update {
            text-align: center;
            font-size: 11px;
            color: #999;
            margin-bottom: 12px;
        }
    </style>
</head>
