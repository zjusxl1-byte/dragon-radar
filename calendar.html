    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: -apple-system, "PingFang SC", "Helvetica Neue", sans-serif; 
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px 16px;
        }
        .container {
            background: white;
            border-radius: 16px;
            padding: 20px;
            max-width: 600px;
            margin: 0 auto;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
        }
        
        /* 头部 */
        .header { 
            text-align: center; 
            padding-bottom: 20px;
            border-bottom: 1px solid #f0f0f0;
            margin-bottom: 20px;
        }
        .header h1 { 
            color: #333; 
            font-size: 18px; 
            margin-bottom: 6px;
            font-weight: 600;
        }
        .header .date { color: #999; font-size: 12px; }
        
        /* 导航按钮 */
        .nav-buttons {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
        }
        .nav-btn {
            flex: 1;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            padding: 10px;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            text-decoration: none;
            text-align: center;
        }
        
        /* 周历导航 */
        .calendar-nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }
        .calendar-nav button {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 8px;
            font-size: 14px;
            cursor: pointer;
        }
        .calendar-nav .month-label {
            font-size: 16px;
            font-weight: 600;
            color: #333;
        }
        
        /* 周历表格 */
        .calendar {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 20px;
        }
        .calendar th {
            color: #999;
            font-size: 12px;
            padding: 8px 4px;
            text-align: center;
        }
        .calendar td {
            width: 14.28%;
            height: 50px;
            text-align: center;
            padding: 4px;
            cursor: pointer;
            border-radius: 8px;
            transition: all 0.2s;
        }
        .calendar td:hover {
            background: #f0f0f0;
        }
        .calendar td.has-data {
            background: linear-gradient(135deg, #667eea20, #764ba220);
            border: 1px solid #667eea;
        }
        .calendar td.today {
            background: linear-gradient(135deg, #FF6B35, #ff8f66);
            color: white;
            font-weight: bold;
        }
        .calendar td.selected {
            box-shadow: 0 0 0 3px #667eea;
        }
        .calendar .day-number {
            font-size: 14px;
        }
        .calendar .day-count {
            font-size: 10px;
            color: #999;
            margin-top: 2px;
        }
        .calendar td.today .day-count {
            color: #fff;
        }
        
        /* 数据区域 */
        .data-section {
            background: #f8f9fa;
            border-radius: 12px;
            padding: 16px;
            margin-top: 20px;
        }
        .data-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }
        .data-date {
            font-size: 16px;
            font-weight: 600;
            color: #333;
        }
        .data-stats {
            display: flex;
            gap: 15px;
        }
        .stat {
            text-align: center;
        }
        .stat-number {
            font-size: 18px;
            font-weight: bold;
            color: #FF6B35;
        }
        .stat-label {
            font-size: 11px;
            color: #999;
        }
        
        /* 企业卡片 */
        .card { 
            background: white;
            border-radius: 12px; 
            padding: 16px; 
            margin-bottom: 12px; 
            border: 1px solid #e8e8e8;
        }
        .card-header {
            display: flex;
            gap: 10px;
            margin-bottom: 10px;
        }
        .card-number {
            background: linear-gradient(135deg, #FF6B35, #ff8f66);
            color: white;
            width: 24px;
            height: 24px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 12px;
            flex-shrink: 0;
        }
        .card-title { 
            font-size: 13px; 
            color: #666;
            line-height: 1.4;
            flex: 1;
        }
        .company-name { 
            font-size: 15px; 
            font-weight: 700; 
            color: #1a1a1a;
            margin-bottom: 8px;
        }
        .company-info {
            display: flex;
            gap: 10px;
            font-size: 11px;
            color: #666;
        }
        .company-info span {
            background: #f0f0f0;
            padding: 3px 8px;
            border-radius: 5px;
        }
        
        /* 空状态 */
        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: #999;
        }
        .empty-state .icon {
            font-size: 48px;
            margin-bottom: 10px;
        }
        
        /* 页脚 */
        .footer { 
            text-align: center; 
            margin-top: 20px; 
            padding-top: 15px; 
            border-top: 1px solid #f0f0f0; 
            color: #999; 
            font-size: 11px;
        }
        
        a { color: #667eea; text-decoration: none; }
    </style>
</head>
