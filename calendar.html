<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>寻龙雷达 - 周历视图</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: -apple-system, "PingFang SC", "Helvetica Neue", sans-serif; 
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px 16px;
        }
        .container {
            background: white;
            border-radius: 20px;
            padding: 24px;
            max-width: 600px;
            margin: 0 auto;
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
        }
        
        .header { 
            text-align: center; 
            padding-bottom: 20px;
            border-bottom: 2px solid #f0f0f0;
            margin-bottom: 24px;
        }
        .header h1 { 
            color: #333; 
            font-size: 22px; 
            margin-bottom: 8px;
            font-weight: 700;
        }
        .header .subtitle { 
            color: #999; 
            font-size: 13px; 
        }
        
        /* 导航按钮 */
        .nav-buttons {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }
        .nav-btn {
            flex: 1;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            padding: 12px;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            text-decoration: none;
            text-align: center;
            transition: all 0.2s;
        }
        .nav-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.3);
        }
        
        /* 周历表格 */
        .calendar {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 24px;
        }
        .calendar th {
            color: #999;
            font-size: 12px;
            padding: 10px 4px;
            text-align: center;
        }
        .calendar td {
            width: 14.28%;
            height: 60px;
            text-align: center;
            padding: 6px;
            border-radius: 10px;
            transition: all 0.2s;
            cursor: pointer;
        }
        .calendar td:hover {
            background: #f0f0f0;
        }
        .calendar td.has-data {
            background: linear-gradient(135deg, #667eea20, #764ba220);
            border: 2px solid #667eea;
        }
        .calendar td.today {
            background: linear-gradient(135deg, #FF6B35, #ff8f66);
            color: white;
            font-weight: bold;
        }
        .calendar td.empty {
            background: transparent;
            cursor: default;
        }
        .calendar .day-number {
            font-size: 16px;
            font-weight: 600;
        }
        .calendar .day-count {
            font-size: 10px;
            color: #999;
            margin-top: 4px;
        }
        .calendar td.today .day-count {
            color: #fff;
        }
        
        /* 说明文字 */
        .info-box {
            background: linear-gradient(135deg, #f0f7ff, #e8f4f8);
            border-left: 4px solid #2196F3;
            border-radius: 10px;
            padding: 16px;
            margin-top: 20px;
        }
        .info-title {
            font-size: 13px;
            font-weight: 600;
            color: #1976D2;
            margin-bottom: 8px;
        }
        .info-content {
            font-size: 12px;
            color: #555;
            line-height: 1.6;
        }
        
        .footer { 
            text-align: center; 
            margin-top: 24px; 
            padding-top: 16px; 
            border-top: 1px solid #f0f0f0; 
            color: #999; 
            font-size: 11px;
        }
        
        /* 链接样式 */
        a {
            color: #667eea;
            text-decoration: none;
        }
    </style>
</head>
