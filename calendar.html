<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>寻龙雷达 | 周历视图</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: -apple-system, "PingFang SC", "Helvetica Neue", sans-serif; 
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px 16px;
        }
        .container {
            background: white;
            border-radius: 20px;
            padding: 24px;
            max-width: 600px;
            margin: 0 auto;
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
        }
        
        /* 头部 */
        .header { 
            text-align: center; 
            padding-bottom: 24px;
            border-bottom: 2px solid #f0f0f0;
            margin-bottom: 24px;
        }
        .header h1 { 
            color: #333; 
            font-size: 24px; 
            margin-bottom: 8px;
            font-weight: 800;
        }
        .header .subtitle { 
            color: #999; 
            font-size: 14px; 
        }
        
        /* 今日概览卡片 */
        .today-card {
            background: linear-gradient(135deg, #FF6B35, #ff8f66);
            color: white;
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 24px;
        }
        .today-label {
            font-size: 12px;
            opacity: 0.9;
            margin-bottom: 8px;
        }
        .today-date {
            font-size: 28px;
            font-weight: 800;
            margin-bottom: 16px;
        }
        .today-stats {
            display: flex;
            gap: 24px;
        }
        .stat {
            text-align: center;
        }
        .stat-number {
            font-size: 32px;
            font-weight: 800;
        }
        .stat-label {
            font-size: 12px;
            opacity: 0.9;
            margin-top: 4px;
        }
        
        /* 快捷导航 */
        .nav-section {
            margin-bottom: 24px;
        }
        .nav-section-title {
            font-size: 14px;
            color: #666;
            margin-bottom: 12px;
            font-weight: 600;
        }
        .nav-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
        }
        .nav-card {
            background: #f8f9fa;
            border-radius: 12px;
            padding: 16px;
            text-decoration: none;
            color: #333;
            transition: transform 0.2s;
        }
        .nav-card:hover {
            transform: translateY(-2px);
            background: #e9ecef;
        }
        .nav-card-icon {
            font-size: 24px;
            margin-bottom: 8px;
        }
        .nav-card-title {
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 4px;
        }
        .nav-card-desc {
            font-size: 12px;
            color: #999;
        }
        .nav-card.badge {
            position: relative;
        }
        .nav-card.badge::after {
            content: 'NEW';
            position: absolute;
            top: 8px;
            right: 8px;
            background: #ff4757;
            color: white;
            font-size: 10px;
            padding: 2px 6px;
            border-radius: 4px;
            font-weight: 600;
        }
        
        /* TOP3 企业 */
        .top-section {
            margin-bottom: 24px;
        }
        .top-title {
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 16px;
            color: #333;
        }
        .company-card {
            background: #f8f9fa;
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .rank {
            font-size: 24px;
            font-weight: 800;
            min-width: 32px;
        }
        .company-info {
            flex: 1;
        }
        .company-name {
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 4px;
            color: #333;
        }
        .company-meta {
            font-size: 12px;
            color: #999;
        }
        
        /* 页脚 */
        .last-update {
            text-align: center;
            font-size: 12px;
            color: #999;
            margin-bottom: 16px;
        }
        .footer {
            text-align: center;
            padding-top: 16px;
            border-top: 1px solid #f0f0f0;
        }
        .footer p {
            font-size: 12px;
            color: #999;
            margin: 4px 0;
        }
    </style>
</head>
<body>
