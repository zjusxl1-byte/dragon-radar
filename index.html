<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>寻龙雷达 - 杭州未来"六小龙"发现系统</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: -apple-system, "PingFang SC", "Helvetica Neue", sans-serif; 
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px 16px;
        }
        .container {
            background: white;
            border-radius: 20px;
            padding: 24px;
            max-width: 600px;
            margin: 0 auto;
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
        }
        
        .header { 
            text-align: center; 
            padding-bottom: 24px;
            border-bottom: 2px solid #f0f0f0;
            margin-bottom: 24px;
        }
        .header h1 { 
            color: #333; 
            font-size: 24px; 
            margin-bottom: 8px;
            font-weight: 800;
            letter-spacing: -0.5px;
        }
        .header .subtitle { 
            color: #999; 
            font-size: 14px; 
        }
        .header .tagline {
            color: #667eea;
            font-size: 12px;
            margin-top: 8px;
            font-weight: 600;
        }
        
        /* 今日概览卡片 */
        .today-card {
            background: linear-gradient(135deg, #FF6B35, #ff8f66);
            color: white;
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 24px;
            position: relative;
            overflow: hidden;
        }
        .today-card::before {
            content: '📊';
            position: absolute;
            top: 10px;
            right: 15px;
            font-size: 48px;
            opacity: 0.2;
        }
        .today-label {
            font-size: 12px;
            opacity: 0.9;
            margin-bottom: 8px;
        }
        .today-date {
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 16px;
        }
        .today-stats {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
        }
        .stat {
            text-align: center;
        }
        .stat-number {
            font-size: 32px;
            font-weight: bold;
        }
        .stat-label {
            font-size: 11px;
            opacity: 0.9;
            margin-top: 4px;
        }
        
        /* 快捷导航 */
        .nav-section {
            margin-bottom: 24px;
        }
        .nav-section-title {
            font-size: 14px;
            font-weight: 600;
            color: #999;
            margin-bottom: 12px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .nav-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
        }
        .nav-card {
            background: #f8f9fa;
            border-radius: 12px;
            padding: 18px;
            text-decoration: none;
            color: #333;
            transition: all 0.2s;
            border: 2px solid transparent;
        }
        .nav-card:hover {
            background: white;
            border-color: #667eea;
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.2);
            transform: translateY(-2px);
        }
        .nav-card-icon {
            font-size: 28px;
            margin-bottom: 8px;
        }
        .nav-card-title {
            font-size: 15px;
            font-weight: 600;
            margin-bottom: 4px;
        }
        .nav-card-desc {
            font-size: 12px;
            color: #999;
            line-height: 1.4;
        }
        .nav-card.badge {
            position: relative;
        }
        .nav-card.badge::after {
            content: 'NEW';
            position: absolute;
            top: 8px;
            right: 8px;
            background: #43e97b;
            color: #0d5c3f;
            font-size: 9px;
            font-weight: bold;
            padding: 2px 6px;
            border-radius: 5px;
        }
        
        /* 数据概览 */
        .stats-card {
            background: linear-gradient(135deg, #f0f7ff, #e8f4f8);
            border-left: 4px solid #2196F3;
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 24px;
        }
        .stats-title {
            font-size: 13px;
            font-weight: 600;
            color: #1976D2;
            margin-bottom: 12px;
        }
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
        }
        .stats-item {
            text-align: center;
        }
        .stats-number {
            font-size: 24px;
            font-weight: bold;
            color: #667eea;
        }
        .stats-label {
            font-size: 11px;
            color: #999;
            margin-top: 4px;
        }
        
        /* 本周亮点 */
        .highlights {
            background: linear-gradient(135deg, #f0f7ff, #e8f4f8);
            border-left: 4px solid #2196F3;
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 24px;
        }
        .highlights-title {
            font-size: 14px;
            font-weight: 600;
            color: #1976D2;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        
        .footer { 
            text-align: center; 
            margin-top: 16px; 
            padding-top: 16px; 
            border-top: 1px solid #f0f0f0; 
            color: #999; 
            font-size: 11px;
        }
    </style>
</head>
<body>

        <!-- 快捷导航 -->
        <div class="nav-section">

            <div class="nav-grid">
                <a href="today.html" class="nav-card badge">

                <a href="calendar.html" class="nav-card">

                    <div class="nav-card-desc">点击日期查看历史数据</div>
                </a>
                <a href="weekly.html" class="nav-card badge">

                <a href="#archive" class="nav-card" onclick="alert('历史归档可通过周历视图访问'); return false;">

            </div>
        </div>
        
        <!-- 本周亮点 -->
        
        <div class="highlights">

            <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-top:10px;">
                <div style="text-align:center;background:white;border-radius:8px;padding:12px;">
                    <div style="font-size:20px;font-weight:bold;color:#667eea;">8</div>
                    <div style="font-size:10px;color:#999;margin-top:4px;">企业总数</div>
                </div>
                <div style="text-align:center;background:white;border-radius:8px;padding:12px;">

                    <div style="font-size:10px;color:#999;margin-top:4px;">当前周</div>
                </div>
                <div style="text-align:center;background:white;border-radius:8px;padding:12px;">
                    <div style="font-size:20px;font-weight:bold;color:#FF6B35;">8</div>
                    <div style="font-size:10px;color:#999;margin-top:4px;">已收录</div>
                </div>
            </div>
        </div>

        
        <div class="footer">
            <p><strong>—— 寻龙雷达 🐉 | 小贾 🤖</strong></p>
            <p style="margin-top: 8px; color: #bbb;">发现杭州未来的"六小龙"</p>
        </div>
    </div>
</body>
</html>
