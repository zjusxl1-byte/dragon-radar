    <script>
        window.RadarData = {
            manifest: null,
            loaded: false,
            error: null
        };

        // 安全锚点 ID
        function generateSafeId(str) {
            var hash = 0;
            if (!str || str.length === 0) return 'card-0';
            for (var i = 0; i < str.length; i++) {
                var char = str.charCodeAt(i);
                hash = ((hash << 5) - hash) + char;
                hash = hash & hash;
            }
            return 'card-' + Math.abs(hash);
        }

        function getScoreColor(score) {
            if (!score) return 'text-gray-400';
            if (score >= 100) return 'text-red-600';
            if (score >= 80) return 'text-red-500';
            if (score >= 50) return 'text-orange-500';
            return 'text-gray-400';
        }

        function getScoreBadge(score) {
            if (!score) return 'bg-gray-300 text-gray-600 border-gray-100';
            if (score >= 100) return 'bg-gradient-to-br from-red-600 to-rose-700 text-white border-red-200 shadow-sm';
            if (score >= 80) return 'bg-gradient-to-br from-red-400 to-red-600 text-white border-red-200 shadow-sm';
            if (score >= 50) return 'bg-gradient-to-br from-orange-400 to-orange-500 text-white border-orange-200 shadow-sm';
            return 'bg-gray-300 text-gray-600';
        }

        // 🌟 扩充七彩业务光谱 (Event Palette)
        function getEventTagStyle(eventType) {
            if (!eventType) return 'bg-gray-100 text-gray-500';
            var styles = {
                '融资': 'bg-rose-50 text-rose-600 border border-rose-100',
                'IPO': 'bg-amber-50 text-amber-600 border border-amber-100',
                '搬迁': 'bg-cyan-50 text-cyan-600 border border-cyan-100',
                '扩张': 'bg-emerald-50 text-emerald-600 border border-emerald-100',
                '技术突破': 'bg-indigo-50 text-indigo-600 border border-indigo-100',
                '重磅发布': 'bg-violet-50 text-violet-600 border border-violet-100',
                '战略合作': 'bg-blue-50 text-blue-600 border border-blue-100',
                '并购': 'bg-fuchsia-50 text-fuchsia-600 border border-fuchsia-100',
                '资质获批': 'bg-teal-50 text-teal-600 border border-teal-100',
                '负面': 'bg-red-50 text-red-600 border border-red-100'
            };
            return styles[eventType] || 'bg-gray-100 text-gray-500 border border-gray-200';
        }

        function formatDate(dateStr) {
            if (!dateStr) return '';
            var date = new Date(dateStr.replace(/-/g, '/'));
            var today = new Date();
            var yesterday = new Date(today);
            yesterday.setDate(yesterday.getDate() - 1);
            if (date.toDateString() === today.toDateString()) return '今日';
            if (date.toDateString() === yesterday.toDateString()) return '昨日';
            return (date.getMonth() + 1) + '月' + date.getDate() + '日';
        }
        
        function generateWeekOptions(availableWeeks, selectedWeekId) {
            if (!availableWeeks || availableWeeks.length === 0) {
                return '<option value="' + selectedWeekId + '">' + selectedWeekId + ' (最新)</option>';
            }
            var html = '';
            for (var i = 0; i < availableWeeks.length; i++) {
                var weekStr = availableWeeks[i];
                var isSelected = weekStr === selectedWeekId ? ' selected' : '';
                var label = weekStr + (i === 0 ? ' (最新)' : ' (归档)');
                html += '<option value="' + weekStr + '"' + isSelected + '>' + label + '</option>';
            }
            return html;
        }

        function generateMonthOptions(availableMonths, selectedMonthId) {
            if (!availableMonths || availableMonths.length === 0) {
                return '<option value="' + selectedMonthId + '">' + selectedMonthId + ' (最新)</option>';
            }
            var html = '';
            for (var i = 0; i < availableMonths.length; i++) {
                var monthStr = availableMonths[i];
                var isSelected = monthStr === selectedMonthId ? ' selected' : '';
                var label = monthStr + (i === 0 ? ' (最新)' : ' (归档)');
                html += '<option value="' + monthStr + '"' + isSelected + '>' + label + '</option>';
            }
            return html;
        }

        // 🧠 核心：智能赛道语义聚合引擎
        function normalizeSectors(sectorData) {
            var macroSectors = {
                '人工智能与算力': ['人工智能', 'AI', '算力', '模型', '数据', '算法'],
                '医疗与生命科学': ['医疗', '医药', '生物', '脑机', '基因', '神经', '健康', '器械'],
                '机器人与自动驾驶': ['机器', '具身', '自动驾驶', '无人', '飞行', '汽车'],
                '先进制造与新材料': ['制造', '半导体', '芯片', '材料', '化工', '硬件', '船舶', '电气', '装备'],
                '新能源与双碳': ['新能源', '能源', '碳', '电池', '光伏', '储能'],
                '新消费与泛互娱': ['消费', '文创', '游戏', '电商', '社交', '文化', '艺术', '潮玩', '影视', '出海', '演出']
            };
            var counts = {};
            function processSector(rawName, count) {
                var matchedAny = false; 
                for (var macro in macroSectors) {
                    var keywords = macroSectors[macro];
                    for (var j = 0; j < keywords.length; j++) {
                        if (rawName.toUpperCase().indexOf(keywords[j].toUpperCase()) !== -1) {
                            counts[macro] = (counts[macro] || 0) + count;
                            matchedAny = true;
                            break; 
                        }
                    }
                }
                if (!matchedAny) {
                    counts['前沿跨界探索'] = (counts['前沿跨界探索'] || 0) + count;
                }
            }

            if (Array.isArray(sectorData)) {
                for(var i=0; i<sectorData.length; i++) { processSector(sectorData[i].sector, sectorData[i].count); }
            } else if (typeof sectorData === 'object') {
                for (var key in sectorData) { processSector(key, sectorData[key]); }
            }

            var sorted = [];
            for (var k in counts) {
                if (counts[k] > 0) sorted.push({ sector: k, count: counts[k] });
            }
            sorted.sort(function(a, b) { return b.count - a.count; });
            return sorted; 
        }
        
        // 🧩 提取通用元数据面板 HTML
        function buildMetaDataHtml(item) {
            var financing = item.financing_info || item.financing || '';
            var metaItems = [];
            
            var skipWords = ['无相关信息', '未披露', '-', '未提及', 'null', ''];
            
            if (financing && skipWords.indexOf(String(financing).trim()) === -1) {
                metaItems.push('<div class="flex items-start gap-3"><span class="text-gray-400 w-12 shrink-0">资本动作</span><span class="text-gray-800 font-medium flex-1 leading-snug">' + financing + '</span></div>');
            }
            if (item.core_tech && skipWords.indexOf(String(item.core_tech).trim()) === -1) {
                metaItems.push('<div class="flex items-start gap-3"><span class="text-gray-400 w-12 shrink-0">核心技术</span><span class="text-gray-800 font-medium flex-1 leading-snug">' + item.core_tech + '</span></div>');
            }
            if (item.official_evaluation && skipWords.indexOf(String(item.official_evaluation).trim()) === -1) {
                metaItems.push('<div class="flex items-start gap-3"><span class="text-gray-400 w-12 shrink-0">官方认定</span><span class="text-gray-800 font-medium flex-1 leading-snug">' + item.official_evaluation + '</span></div>');
            }
            if (item.founder_info && skipWords.indexOf(String(item.founder_info).trim()) === -1) {
                metaItems.push('<div class="flex items-start gap-3"><span class="text-gray-400 w-12 shrink-0">创始人</span><span class="text-gray-800 font-medium flex-1 leading-snug">' + item.founder_info + '</span></div>');
            }

            if (metaItems.length > 0) {
                return '<div class="bg-gray-50/80 rounded-xl p-3 mb-3.5 space-y-2 border border-gray-100/80 text-[12px]">' + metaItems.join('') + '</div>';
            }
            return '';
        }

        // ============================================
        // 🚨 负面预警卡片组件
        // ============================================
        function renderNegativeCard(item, isCompact) {
            var company = item.company_name || item.company || '未知企业';
            var title = item.title || '无内容';
            var source = item.source || '未知信源';
            var reason = item.reason || '';
            var sector = item.sector || '未知赛道';
            var location = item.location || '';
            var link = item.link || '';
            var articleTitle = item.event_description || item.article_title || item.title || '';
            var eventDesc = item.event_desc || '';
            var insight = item.insight || '';
            var date = item.date || window.RadarData.manifest.today;
            
            var aiqichaUrl = 'https://aiqicha.baidu.com/s?q=' + encodeURIComponent(company);
            var targetId = generateSafeId(company);

            // 智能地址渲染
            var locationHtml = (location && location.trim() !== '' && location !== '-' && location !== '未提及') 
                ? '<span class="px-2 py-0.5 text-[10px] font-medium rounded bg-gray-50 text-gray-500">📍 ' + location + '</span>' : '';
                
            // 紫金标杆渲染
            var isNationalStar = item.is_national_star === true;
            var starHtml = isNationalStar ? '<span class="px-2 py-0.5 text-[10px] font-bold rounded bg-gradient-to-r from-purple-500 to-indigo-500 text-white shadow-[0_2px_4px_rgba(168,85,247,0.3)] border border-purple-400">🌐 全国标杆</span>' : '';
            var compactStarHtml = isNationalStar ? '<span class="px-1.5 py-0.5 text-[9px] font-bold rounded bg-gradient-to-r from-purple-500 to-indigo-500 text-white shadow-sm">🌐标杆</span>' : '';

            if (isCompact) {
                var cardClick = 'onclick="Router.navigate(\'/today?date=' + date + '&target=' + targetId + '\')"';
                return '<div class="bg-red-50 rounded-xl p-3 mb-2.5 border border-red-100 shadow-sm relative overflow-hidden transition-all active:scale-[0.98] cursor-pointer" ' + cardClick + '>' +
                    '<div class="flex justify-between items-center gap-2">' +
                        '<div class="flex items-center gap-2 min-w-0 flex-1">' +
                            '<div class="shrink-0 w-6 h-6 bg-red-100 text-red-500 rounded-full flex items-center justify-center text-[10px]">⚠️</div>' +
                            '<div class="min-w-0 flex-1">' +
                                '<div class="flex items-center gap-1.5"><h3 class="text-[14px] font-bold text-red-800 leading-snug truncate">' + company + '</h3>' + compactStarHtml + '</div>' +
                                '<div class="text-[10px] text-red-500 truncate mt-0.5">' + (articleTitle || title || '检测到风险事件') + '</div>' +
                            '</div>' +
                        '</div>' +
                        '<span class="text-red-400 text-xs font-bold shrink-0">查阅 →</span>' +
                    '</div>' +
                '</div>';
            }
            
            var metaHtml = buildMetaDataHtml(item);

            return '<div id="' + targetId + '" class="scroll-margin bg-gradient-to-br from-red-50 to-white rounded-2xl p-4 mb-4 border border-red-100 shadow-sm relative overflow-hidden transition-all duration-500">' +
                '<div class="absolute -right-4 -top-4 text-6xl opacity-5 pointer-events-none">🚨</div>' +
                '<div class="flex items-start gap-2 mb-3">' +
                    '<div class="shrink-0 w-7 h-7 mt-0.5 bg-red-100 text-red-500 rounded-full flex items-center justify-center text-xs">⚠️</div>' +
                    '<div>' +
                        '<h3 class="text-[16px] font-extrabold text-gray-800 leading-snug tracking-tight mb-1.5">' + company + '</h3>' +
                        '<span class="px-2 py-0.5 text-[10px] font-bold rounded bg-white border border-gray-200 text-gray-500 shadow-sm inline-flex items-center gap-1">📰 ' + source + '</span>' +
                    '</div>' +
                '</div>' +
                '<div class="flex flex-wrap gap-1.5 mb-3.5">' +
                    starHtml +
                    '<span class="px-2 py-0.5 text-[10px] font-semibold rounded bg-red-100 text-red-600 border border-red-200">风险预警</span>' +
                    '<span class="px-2 py-0.5 text-[10px] font-medium rounded bg-[#F4F6FB] text-[#4A6495]">' + sector + '</span>' +
                    locationHtml +
                '</div>' +
                
                (articleTitle ? '<div class="mb-2 text-[14px] font-bold text-gray-800 leading-snug border-l-[3px] border-red-500 pl-2">' + articleTitle + '</div>' : '') +
                
                metaHtml + 
                
                ((eventDesc || reason) ? '<div class="mb-3 text-[13px] text-gray-600 leading-relaxed text-justify">' + (eventDesc || reason) + '</div>' : '') +
                
                (insight ? '<div class="mb-3 p-3 bg-red-50/80 rounded-xl border border-red-100/50">' +
                    '<div class="flex items-center gap-1.5 mb-1.5"><span class="text-[12px]">🛑</span><span class="text-[11px] font-extrabold text-red-700 tracking-wider">小贾风险洞察</span></div>' +
                    '<p class="text-[12px] text-red-800/90 leading-relaxed text-justify">' + insight + '</p>' +
                '</div>' : '') +
                
                '<div class="flex items-center gap-2 mt-4 pt-3 border-t border-red-100/60">' +
                    '<button onclick="window.open(\'' + aiqichaUrl + '\', \'_blank\')" class="flex-1 py-2.5 bg-white text-red-600 border border-red-200 rounded-xl text-xs font-bold active:bg-red-50 transition-colors flex items-center justify-center gap-1"><span>🏢</span><span>查企业</span></button>' +
                    (link ? '<button onclick="window.open(\'' + link + '\', \'_blank\')" class="flex-1 py-2.5 bg-red-500 text-white rounded-xl text-xs font-bold active:bg-red-600 transition-colors flex items-center justify-center gap-1"><span>📰</span><span>阅读原文</span></button>' : '') +
                '</div>' +
            '</div>';
        }

        // ============================================
        // 🟢 发现企业卡片组件
        // ============================================
        function renderCompanyCard(company, index, isCompact) {
            var companyName = company.company_name || company.company || '未知企业';
            var scoreColor = getScoreBadge(company.score || 50);
            var eventType = company.event_type || '其他';
            var eventStyle = getEventTagStyle(eventType);
            var sector = company.sector || '未知赛道';
            var location = company.location || '';
            var source = company.source || '未知信源';
            var articleTitle = company.event_description || company.article_title || company.title || '';
            var eventDesc = company.event_desc || '';
            var insight = company.insight || company.summary || ''; 
            var link = company.link || '';
            var date = company.date || window.RadarData.manifest.today;
            
            var aiqichaUrl = 'https://aiqicha.baidu.com/s?q=' + encodeURIComponent(companyName);
            var targetId = generateSafeId(companyName);
            
            var locationHtml = (location && location.trim() !== '' && location !== '-' && location !== '未提及') 
                ? '<span class="px-2 py-0.5 text-[10px] font-medium rounded bg-gray-50 text-gray-500">📍 ' + location + '</span>' : '';
                
            var isNationalStar = company.is_national_star === true;
            var starHtml = isNationalStar ? '<span class="px-2 py-0.5 text-[10px] font-bold rounded bg-gradient-to-r from-purple-500 to-indigo-500 text-white shadow-[0_2px_4px_rgba(168,85,247,0.3)] border border-purple-400">🌐 全国标杆</span>' : '';
            var compactStarHtml = isNationalStar ? '<span class="px-1.5 py-0.5 text-[9px] font-bold rounded bg-gradient-to-r from-purple-500 to-indigo-500 text-white shadow-sm">🌐标杆</span>' : '';

            if (isCompact) {
                var cardClick = 'onclick="Router.navigate(\'/today?date=' + date + '&target=' + targetId + '\')"';
                return '<div class="relative bg-white rounded-xl shadow-sm border border-gray-100 p-3 mb-2.5 hover:shadow-md transition-all active:scale-[0.98] cursor-pointer" ' + cardClick + '>' +
                    (index ? '<div class="absolute -top-1.5 -left-1.5 w-5 h-5 rounded-full ' + scoreColor + ' flex items-center justify-center text-[10px] font-black shadow-sm border-2 border-white">' + index + '</div>' : '') +
                    '<div class="flex justify-between items-center gap-2 ml-1.5">' +
                        '<div class="flex-1 min-w-0">' + 
                            '<h3 class="text-[14px] font-bold text-gray-800 leading-snug truncate">' + companyName + '</h3>' +

                    '</div></div>';
                    
                html += '</div>';

            },
            
            calendar: function(data, targetMonth) {
                var availableDates = data.available_dates || [];
                var today = data.today;
                var year, month;
                if (targetMonth && /^\d{4}-\d{2}$/.test(targetMonth)) {
                    var parts = targetMonth.split('-');
                    year = parseInt(parts[0], 10);
                    month = parseInt(parts[1], 10) - 1;
                } else {
                    var now = new Date(today.replace(/-/g, '/'));
                    year = now.getFullYear();
                    month = now.getMonth();
                }
                var firstDay = new Date(year, month, 1);
                var lastDay = new Date(year, month + 1, 0);
                var startDay = firstDay.getDay();
                startDay = startDay === 0 ? 7 : startDay;
                
                var dateMap = {};
                for (var i = 0; i < availableDates.length; i++) {
                    dateMap[availableDates[i].date] = JSON.parse(JSON.stringify(availableDates[i])); 
                }
                
                var weeklyNegatives = data.weekly_negatives || [];
                for (var n = 0; n < weeklyNegatives.length; n++) {
                    var negDate = weeklyNegatives[n].date;
                    if (negDate) {
                        if (!dateMap[negDate]) {
                            dateMap[negDate] = { date: negDate, count: 0, hasData: true, negative_count: 0 };
                        }
                        dateMap[negDate].negative_count = (dateMap[negDate].negative_count || 0) + 1;
                    }
                }
                
                var calendarDays = [];
                for (var j = 1; j < startDay; j++) { calendarDays.push({ type: 'empty' }); }
                for (var day = 1; day <= lastDay.getDate(); day++) {
                    var dateStr = year + '-' + String(month + 1).padStart(2, '0') + '-' + String(day).padStart(2, '0');
                    var dateInfo = dateMap[dateStr];
                    calendarDays.push({
                        type: 'day', day: day, date: dateStr,
                        hasData: !!dateInfo, count: dateInfo ? dateInfo.count : 0,
                        hasHighScore: dateInfo ? dateInfo.has_high_score : false,
                        negativeCount: dateInfo ? (dateInfo.negative_count || 0) : 0,
                        isToday: dateStr === today
                    });
                }
                
                var weekDays = ['一', '二', '三', '四', '五', '六', '日'];
                var monthPrefix = year + '-' + String(month + 1).padStart(2, '0');
                var monthDays = 0, monthCompanies = 0;
                for (var k = 0; k < availableDates.length; k++) {
                    if (availableDates[k].date.indexOf(monthPrefix) === 0) {
                        monthDays++; monthCompanies += availableDates[k].count;
                    }
                }
                
                var prevMonth = month === 0 ? 12 : month;
                var prevYear = month === 0 ? year - 1 : year;
                var nextMonth = month === 11 ? 1 : month + 2;
                var nextYear = month === 11 ? year + 1 : year;
                var prevMonthStr = prevYear + '-' + String(prevMonth).padStart(2, '0');
                var nextMonthStr = nextYear + '-' + String(nextMonth).padStart(2, '0');
                var currentMonthStr = year + '-' + String(month + 1).padStart(2, '0');
                var todayNow = new Date(today.replace(/-/g, '/'));
                var todayMonthStr = todayNow.getFullYear() + '-' + String(todayNow.getMonth() + 1).padStart(2, '0');
                var isCurrentMonth = (currentMonthStr === todayMonthStr);
                
                // Check if there's data in prev/next months
                var hasPrevData = false, hasNextData = false;
                for (var ad = 0; ad < availableDates.length; ad++) {
                    if (availableDates[ad].date.indexOf(prevMonthStr) === 0) hasPrevData = true;
                    if (availableDates[ad].date.indexOf(nextMonthStr) === 0) hasNextData = true;
                }
                
                return '<div class="animate-fade-in">' +
                    '<div class="mb-4 px-1 flex items-center justify-between">' +
                        '<button onclick="Router.navigate(\'/calendar?month=' + prevMonthStr + '\')" class="w-9 h-9 rounded-xl flex items-center justify-center ' + (hasPrevData ? 'bg-white shadow-sm border border-gray-200 text-gray-600 active:scale-90' : 'bg-gray-50 text-gray-300 cursor-default') + ' transition-all"><svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/></svg></button>' +
                        '<div class="text-center"><h2 class="text-xl font-extrabold text-gray-800 tracking-tight">🗓️ 发现日历</h2><p class="text-[11px] text-gray-500 font-medium mt-0.5">' + year + '年' + (month + 1) + '月' + (!isCurrentMonth ? ' <span class="text-[10px] text-primary cursor-pointer underline" onclick="Router.navigate(\'/calendar\')">回到本月</span>' : '') + '</p></div>' +
                        '<button onclick="Router.navigate(\'/calendar?month=' + nextMonthStr + '\')" class="w-9 h-9 rounded-xl flex items-center justify-center ' + (hasNextData ? 'bg-white shadow-sm border border-gray-200 text-gray-600 active:scale-90' : 'bg-gray-50 text-gray-300 cursor-default') + ' transition-all"><svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/></svg></button>' +
                    '</div>' +
                    '<div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-4 mb-4">' +
                        '<div class="grid grid-cols-7 gap-1 mb-2">' + weekDays.map(function(d) { return '<div class="text-center text-[11px] font-bold text-gray-400 py-1">' + d + '</div>'; }).join('') + '</div>' +
                        '<div class="grid grid-cols-7 gap-1.5">' + calendarDays.map(function(cell) {
                            if (cell.type === 'empty') return '<div class="aspect-square"></div>';
                            
                            var isClickable = cell.hasData;
                            var cellTag = isClickable ? 'button' : 'div';
                            var cellClick = isClickable ? 'onclick="Router.navigate(\'/today?date=' + cell.date + '\')"' : '';
                            
                            var cellClass = 'relative aspect-square rounded-xl flex flex-col items-center justify-center text-sm transition-all ';
                            if (isClickable) cellClass += 'active:scale-[0.85] cursor-pointer hover:shadow-sm ';
                            
                            var negativeBadge = cell.negativeCount > 0 ? '<span class="absolute top-[3px] right-[3px] flex h-1.5 w-1.5"><span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-red-400 opacity-75"></span><span class="relative inline-flex rounded-full h-1.5 w-1.5 bg-red-500"></span></span>' : '';
                            
                            if (cell.isToday) cellClass += 'bg-gradient-to-br from-orange-400 to-orange-500 text-white font-bold shadow-md ';
                            else if (cell.hasData) cellClass += cell.hasHighScore ? 'bg-red-50 text-red-600 font-bold border border-red-200 ' : 'bg-blue-50 text-blue-600 border border-blue-100 ';
                            else cellClass += 'bg-gray-50 text-gray-300 ';
                            
                            return '<' + cellTag + ' ' + cellClick + ' class="' + cellClass + '">' +
                                negativeBadge +
                                '<span class="text-[15px]">' + cell.day + '</span>' +
                                (cell.hasData ? '<span class="text-[9px] mt-0.5 font-medium">' + cell.count + '家</span>' : '') +
                            '</' + cellTag + '>';
                        }).join('') + '</div>' +
                    '</div>' +
                    
                    '<div class="flex items-center justify-center gap-4 px-1 mb-6"><span class="flex items-center gap-1 text-[10px] font-medium text-gray-500"><span class="w-2 h-2 rounded-full bg-red-500 shadow-[0_0_2px_rgba(239,68,68,0.8)]"></span> 含风险预警</span><span class="flex items-center gap-1 text-[10px] font-medium text-gray-500"><span class="w-2.5 h-2.5 rounded-sm bg-red-50 border border-red-200"></span> 含高分精选</span></div>' +

            }

        var Router = {
            getRoute: function() {
                var hash = window.location.hash.slice(1) || '/';
                return hash.split('?')[0];
            },
            getQueryParams: function() {
                var hash = window.location.hash || '';
                var parts = hash.split('?');
                var queryString = parts[1] || '';
                var params = {};
                if (queryString) {
                    var pairs = queryString.split('&');
                    for (var i = 0; i < pairs.length; i++) {
                        var pair = pairs[i].split('=');
                        params[decodeURIComponent(pair[0])] = decodeURIComponent(pair[1] || '');
                    }
                }
                return params;
            },
            updateNavActive: function() {
                var route = this.getRoute();
                var navItems = document.querySelectorAll('.nav-item');
                for (var i = 0; i < navItems.length; i++) {
                    var item = navItems[i];
                    var itemRoute = item.getAttribute('data-route');
                    if (itemRoute === route || (route === '' && itemRoute === '/')) {
                        item.classList.add('active');
                    } else {
                        item.classList.remove('active');
                    }
                }
            },
            navigate: function(route) {
                window.location.hash = route;
            }
        };

        function loadDailyData(date) {
            return new Promise(function(resolve, reject) {
                fetch('./data/daily/' + date + '.json')
                    .then(function(response) {
                        if (!response.ok) throw new Error('未能获取 ' + date + ' 的雷达扫描数据');
                        return response.json();
                    })
                    .then(function(data) { resolve(data); })
                    .catch(function(error) { reject(error); });
            });
        }
        
        function loadWeeklyData(weekId) {
            return new Promise(function(resolve, reject) {
                fetch('./data/weekly/' + weekId + '.json')
                    .then(function(response) {
                        if (!response.ok) throw new Error('未能获取 ' + weekId + ' 的周报归档数据');
                        return response.json();
                    })
                    .then(function(data) { resolve(data); })
                    .catch(function(error) { reject(error); });
            });
        }
        
        function loadBriefingData(briefType, briefId) {
            return new Promise(function(resolve, reject) {
                fetch('./data/briefing/' + briefType + '_' + briefId + '.json')
                    .then(function(response) {
                        if (!response.ok) throw new Error('未能获取 ' + briefId + ' 的简报数据');
                        return response.json();
                    })
                    .then(function(data) { resolve(data); })
                    .catch(function(error) { reject(error); });
            });
        }

        function renderPage() {
            var appContent = document.getElementById('app-content');
            Router.updateNavActive();
            
            var route = Router.getRoute();
            var params = Router.getQueryParams();
            
            if (!params.target) {
                window.scrollTo(0, 0);
            }
            
            if (!window.RadarData.loaded) {
                appContent.innerHTML = Views.loading();
                return;
            }
            if (window.RadarData.error) {
                appContent.innerHTML = Views.error(window.RadarData.error.message);
                return;
            }
            
            var manifest = window.RadarData.manifest;
            
            switch (route) {
                case '/':
                    appContent.innerHTML = Views.home(manifest);
                    break;
                case '/today':
                    var targetDate = params.date || manifest.today;
                    appContent.innerHTML = Views.loading();
                    loadDailyData(targetDate).then(function(dailyData) {
                        appContent.innerHTML = Views.today(dailyData, targetDate);
                        
                        if (params.target) {
                            setTimeout(function() {
                                var targetEl = document.getElementById(params.target);
                                if (targetEl) {
                                    targetEl.scrollIntoView({ behavior: 'smooth', block: 'center' });
                                    
                                    targetEl.classList.add('target-highlight');
                                    setTimeout(function() {
                                        targetEl.classList.remove('target-highlight');
                                    }, 2500);
                                }
                            }, 200);
                        }
                    }).catch(function(error) {
                        appContent.innerHTML = Views.error(error.message);
                    });
                    break;
                case '/calendar':
                    appContent.innerHTML = Views.calendar(manifest, params.month);
                    break;
                case '/weekly':
                    var targetWeek = params.week || manifest.current_week;
                    var availableWeeks = manifest.available_weeks || [];
                    
                    if (targetWeek === manifest.current_week && manifest.summary && manifest.summary.week) {
                        appContent.innerHTML = Views.weekly(manifest, availableWeeks);
                    } else {
                        appContent.innerHTML = Views.loading();
                        loadWeeklyData(targetWeek).then(function(weeklyData) {
                            appContent.innerHTML = Views.weekly(weeklyData, availableWeeks);
                        }).catch(function(error) {
                            appContent.innerHTML = Views.error('未找到该历史归档记录：' + error.message);
                        });
                    }
                    break;
                case '/briefing':
                    var briefType = params.type || 'weekly';
                    var briefingsBlock = manifest.briefings || {};
                    var availableBriefings = briefingsBlock[briefType] || [];
                    var targetBriefId = params.id || availableBriefings[0];
                    
                    if (!targetBriefId) {
                        appContent.innerHTML = Views.error('暂无简报数据');
                        break;
                    }
                    
                    appContent.innerHTML = Views.loading();
                    loadBriefingData(briefType, targetBriefId).then(function(briefData) {
                        appContent.innerHTML = Views.briefing(briefData, availableBriefings, briefType);
                    }).catch(function(error) {
                        appContent.innerHTML = Views.error('未找到该简报数据：' + error.message);
                    });
                    break;
                default:
                    appContent.innerHTML = Views.error('页面未找到');
            }
        }

        function initApp() {
            var appContent = document.getElementById('app-content');
            
            Promise.all([
                fetch('./data/manifest.json?t=' + Date.now()).then(function(response) {
                    if (!response.ok) throw new Error('雷达配置加载失败，请检查网络');
                    return response.json();
                }),
                fetch('./data/briefings_manifest.json?t=' + Date.now()).then(function(response) {
                    return response.ok ? response.json() : { weekly: [], monthly: [] };
                }).catch(function() {
                    return { weekly: [], monthly: [] };
                })
            ])
            .then(function(results) {
                var manifestData = results[0];
                var briefingsData = results[1];
                manifestData.briefings = briefingsData;
                window.RadarData.manifest = manifestData;
                    
                    return loadDailyData(manifestData.today).then(function(dailyData) {
                        var targets = dailyData.targets || [];
                        var negatives = dailyData.negatives || [];
                        
                        if (targets.length > 0 || negatives.length > 0) {
                            var finCount = 0;
                            var milestoneCountLocal = 0;
                            var milestoneTypes = ['技术突破', '重磅发布', '战略合作', '并购', '资质获批'];
                            
                            for(var i=0; i<targets.length; i++) {
                                if(targets[i].event_type === '融资' || targets[i].event_type === 'IPO') finCount++;
                                if(milestoneTypes.indexOf(targets[i].event_type) !== -1) milestoneCountLocal++;
                            }
                            var sorted = targets.slice().sort(function(a, b) { return (b.score || 0) - (a.score || 0); });
                            
                            window.RadarData.manifest.summary.today = {
                                date: manifestData.today,
                                total_companies: targets.length,
                                negative_count: negatives.length,
                                financing_count: finCount,
                                milestone_count: (manifestData.summary && manifestData.summary.today && manifestData.summary.today.milestone_count !== undefined) ? manifestData.summary.today.milestone_count : milestoneCountLocal,
                                top3: sorted.slice(0, 5),
                                today_negatives: negatives 
                            };
                            
                            if (window.RadarData.manifest.recent_updates && window.RadarData.manifest.recent_updates.length > 0) {
                                if (window.RadarData.manifest.recent_updates[0].title.indexOf('0') !== -1) {
                                    window.RadarData.manifest.recent_updates[0] = {
                                        title: '截获 ' + targets.length + ' 份高潜情报',
                                        highlight: sorted.length > 0 ? '最高分标的: ' + sorted[0].company : (negatives.length > 0 ? '警告：今日检出 ' + negatives.length + ' 处风险' : '')
                                    };
                                }
                            }
                            
                            var targetDateObj = null;
                            window.RadarData.manifest.available_dates = window.RadarData.manifest.available_dates || [];
                            for(var j=0; j<window.RadarData.manifest.available_dates.length; j++) {
                                if(window.RadarData.manifest.available_dates[j].date === manifestData.today) {
                                    targetDateObj = window.RadarData.manifest.available_dates[j];
                                    break;
                                }
                            }
                            
                            if (targetDateObj) {
                                targetDateObj.count = targets.length;
                                targetDateObj.has_high_score = sorted[0] && sorted[0].score >= 80;
                                targetDateObj.max_score = sorted[0] ? sorted[0].score : 0;
                                targetDateObj.negative_count = negatives.length; 
                            } else {
                                window.RadarData.manifest.available_dates.push({
                                    date: manifestData.today,
                                    count: targets.length,
                                    has_high_score: sorted[0] && sorted[0].score >= 80,
                                    max_score: sorted[0] ? sorted[0].score : 0,
                                    negative_count: negatives.length, 
                                    week_id: manifestData.current_week || ''
                                });
                            }
                        }
                    }).catch(function(err) {
                        console.log("后台静默核对失败，走默认缓存配置");
                    });
                })
                .then(function() {
                    window.RadarData.loaded = true;
                    window.addEventListener('hashchange', renderPage);
                    renderPage();
                })
                .catch(function(error) {
                    window.RadarData.error = error;
                    appContent.innerHTML = Views.error(error.message);
                });
        }

        document.addEventListener('DOMContentLoaded', initApp);
    </script>
</body>
</html>
