<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

    <script src="https://cdn.tailwindcss.com"></script>
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#667eea',
                        secondary: '#764ba2',
                        accent: '#FF6B35'
                    },
                    animation: {
                        'fade-in': 'fadeIn 0.3s ease-out forwards',
                        'pulse-fast': 'pulse 1.5s cubic-bezier(0.4, 0, 0.6, 1) infinite',
                    },
                    keyframes: {
                        fadeIn: {
                            '0%': { opacity: '0', transform: 'translateY(8px)' },
                            '100%': { opacity: '1', transform: 'translateY(0)' }

        }
    </script>
    
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Helvetica Neue", STHeiti, sans-serif;
            -webkit-tap-highlight-color: transparent; 
        }
        ::-webkit-scrollbar { display: none; }
        
        .nav-item { color: #9CA3AF; }
        .nav-item.active { color: #667eea; }
        .nav-item svg { transition: all 0.2s cubic-bezier(0.34, 1.56, 0.64, 1); stroke-width: 1.8; }
        .nav-item.active svg { transform: scale(1.15); stroke-width: 2.5; }
        
        /* 目标定位高亮动画 */
        .target-highlight {
            box-shadow: 0 0 0 3px #667eea, 0 10px 25px -5px rgba(102, 126, 234, 0.4) !important;
            transform: scale(1.02);
            z-index: 10;
        }
    </style>
</head>
<body class="bg-[#F4F5F7] text-gray-800 antialiased relative min-h-screen pb-[calc(3.5rem+env(safe-area-inset-bottom))]">

    <header class="bg-gradient-to-r from-primary to-secondary text-white sticky top-0 z-40 shadow-sm pt-[env(safe-area-inset-top)]">
        <div class="max-w-lg mx-auto px-4 h-12 flex items-center justify-between">
            <div class="flex items-center space-x-2">
                <span class="text-xl">🐉</span>
                <span class="font-extrabold tracking-wide">寻龙雷达</span>
            </div>
            <div class="text-[10px] bg-white/20 px-2 py-1 rounded-full backdrop-blur-sm">发现“六小龙”</div>
        </div>
    </header>

    <main class="max-w-lg mx-auto px-4 py-4 min-h-[70vh]">
        <div id="app-content">
            <div class="animate-pulse-fast space-y-4 py-4">
                <div class="h-24 bg-gray-200 rounded-2xl"></div>
                <div class="h-48 bg-white rounded-2xl shadow-sm"></div>
                <div class="h-48 bg-white rounded-2xl shadow-sm"></div>
            </div>
        </div>
        
        <footer class="text-center py-8 text-gray-400 text-[10px]">
            <p>小贾 🤖 提供数据洞察支持</p>
            <p class="mt-1 opacity-60">杭州专精特新企业培育系统</p>
        </footer>
    </main>

    <nav class="fixed bottom-0 w-full bg-white/95 backdrop-blur-md border-t border-gray-100 z-50 pb-[env(safe-area-inset-bottom)]">
        <div class="max-w-lg mx-auto flex justify-around items-center h-14">
            <a href="#/" data-route="/" class="nav-item flex flex-col items-center justify-center w-full h-full active:bg-gray-50 transition-colors">
                <svg class="w-[22px] h-[22px] mb-0.5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6" /></svg>
                <span class="text-[10px] font-medium">主页</span>
            </a>
            <a href="#/today" data-route="/today" class="nav-item flex flex-col items-center justify-center w-full h-full active:bg-gray-50 transition-colors">
                <svg class="w-[22px] h-[22px] mb-0.5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M19 20H5a2 2 0 01-2-2V6a2 2 0 012-2h10a2 2 0 012 2v1m2 13a2 2 0 01-2-2V7m2 13a2 2 0 002-2V9.5a2.5 2.5 0 00-2.5-2.5H15M9 11h3m-3 4h3m-6-4h.01M6 15h.01M8 20h8" /></svg>
                <span class="text-[10px] font-medium">今日</span>
            </a>
            <a href="#/calendar" data-route="/calendar" class="nav-item flex flex-col items-center justify-center w-full h-full active:bg-gray-50 transition-colors">
                <svg class="w-[22px] h-[22px] mb-0.5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z" /></svg>
                <span class="text-[10px] font-medium">周历</span>
            </a>
            <a href="#/weekly" data-route="/weekly" class="nav-item flex flex-col items-center justify-center w-full h-full active:bg-gray-50 transition-colors">
                <svg class="w-[22px] h-[22px] mb-0.5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z" /></svg>
                <span class="text-[10px] font-medium">周报</span>
            </a>
        </div>
    </nav>

    <script>
        window.RadarData = {
            manifest: null,
            loaded: false,
            error: null
        };

        function getScoreColor(score) {
            if (!score) return 'text-gray-400';
            if (score >= 100) return 'text-red-600';
            if (score >= 80) return 'text-red-500';
            if (score >= 50) return 'text-orange-500';
            return 'text-gray-400';
        }

        function getScoreBadge(score) {
            if (!score) return 'bg-gray-300 text-gray-600 border-gray-100';
            if (score >= 100) return 'bg-gradient-to-br from-red-600 to-rose-700 text-white border-red-200 shadow-sm';
            if (score >= 80) return 'bg-gradient-to-br from-red-400 to-red-600 text-white border-red-200 shadow-sm';
            if (score >= 50) return 'bg-gradient-to-br from-orange-400 to-orange-500 text-white border-orange-200 shadow-sm';
            return 'bg-gray-300 text-gray-600';
        }

        function getEventTagStyle(eventType) {
            if (!eventType) return 'bg-gray-100 text-gray-500';
            var styles = {
                '融资': 'bg-rose-50 text-rose-600 border border-rose-100',
                'IPO': 'bg-amber-50 text-amber-600 border border-amber-100',
                '搬迁': 'bg-cyan-50 text-cyan-600 border border-cyan-100',
                '扩张': 'bg-emerald-50 text-emerald-600 border border-emerald-100',
                '其他': 'bg-purple-50 text-purple-600 border border-purple-100'
            };
            return styles[eventType] || 'bg-gray-100 text-gray-500 border border-gray-200';
        }

        function formatDate(dateStr) {
            if (!dateStr) return '';
            var date = new Date(dateStr.replace(/-/g, '/'));
            var today = new Date();
            var yesterday = new Date(today);
            yesterday.setDate(yesterday.getDate() - 1);
            
            if (date.toDateString() === today.toDateString()) return '今日';
            if (date.toDateString() === yesterday.toDateString()) return '昨日';
            return (date.getMonth() + 1) + '月' + date.getDate() + '日';
        }
        
        // 优雅推算历史周报 (生成下拉框选项)
        function generateWeekOptions(currentWeekStr) {
            if (!currentWeekStr) return '';
            var parts = currentWeekStr.split('-W');
            if(parts.length !== 2) return '<option value="'+currentWeekStr+'">'+currentWeekStr+' (本周)</option>';
            
            var year = parseInt(parts[0]);
            var week = parseInt(parts[1]);
            var html = '<option value="' + currentWeekStr + '">' + currentWeekStr + ' (本周)</option>';
            
            for(var i=1; i<=3; i++) {
                var w = week - i;
                var y = year;
                if(w <= 0) { w += 52; y -= 1; }
                var wStr = y + '-W' + String(w).padStart(2, '0');
                html += '<option value="' + wStr + '">' + wStr + ' 历史归档</option>';
            }
            return html;
        }

        // ============================================
        // 🚨 负面预警卡片组件
        // ============================================
        function renderNegativeCard(item, isCompact) {
            var company = item.company || '未知企业';
            var title = item.title || '无内容';
            var source = item.source || '未知信源';
            var reason = item.reason || '';
            var sector = item.sector || '未知赛道';
            var location = item.location || '未知区域';
            var link = item.link || '';
            var articleTitle = item.article_title || item.title || '';
            var eventDesc = item.event_desc || '';
            var insight = item.insight || '';
            var date = item.date || window.RadarData.manifest.today;
            
            var aiqichaUrl = 'https://aiqicha.baidu.com/s?q=' + encodeURIComponent(company);
            var safeId = 'company-' + encodeURIComponent(company);

            // ⚠️ 仅周报使用的紧凑目录模式，带精确制导锚点参数
            if (isCompact) {
                var cardClick = 'onclick="Router.navigate(\'/today?date=' + date + '&target=' + encodeURIComponent(company) + '\')"';
                return '<div class="bg-red-50 rounded-xl p-3 mb-2.5 border border-red-100 shadow-sm relative overflow-hidden transition-all active:scale-[0.98] cursor-pointer" ' + cardClick + '>' +
                    '<div class="flex justify-between items-center gap-2">' +
                        '<div class="flex items-center gap-2 min-w-0 flex-1">' +
                            '<div class="shrink-0 w-6 h-6 bg-red-100 text-red-500 rounded-full flex items-center justify-center text-[10px]">⚠️</div>' +
                            '<div class="min-w-0 flex-1">' +
                                '<h3 class="text-[14px] font-bold text-red-800 leading-snug truncate">' + company + '</h3>' +
                                '<div class="text-[10px] text-red-500 truncate mt-0.5">' + (articleTitle || title || '检测到风险事件') + '</div>' +
                            '</div>' +
                        '</div>' +
                        '<span class="text-red-300 text-xs font-bold shrink-0">查阅 →</span>' +
                    '</div>' +
                '</div>';
            }

            // 🌟 沉浸阅读模式（主页、今日展示）
            return '<div id="' + safeId + '" class="bg-gradient-to-br from-red-50 to-white rounded-2xl p-4 mb-4 border border-red-100 shadow-sm relative overflow-hidden transition-all duration-500">' +
                '<div class="absolute -right-4 -top-4 text-6xl opacity-5 pointer-events-none">🚨</div>' +
                '<div class="flex items-start gap-2 mb-3">' +
                    '<div class="shrink-0 w-7 h-7 mt-0.5 bg-red-100 text-red-500 rounded-full flex items-center justify-center text-xs">⚠️</div>' +
                    '<div>' +
                        '<h3 class="text-[16px] font-extrabold text-gray-800 leading-snug tracking-tight mb-1.5">' + company + '</h3>' +
                        // 将公众号来源高亮前置在标题下方
                        '<span class="px-2 py-0.5 text-[10px] font-bold rounded bg-white border border-gray-200 text-gray-500 shadow-sm inline-flex items-center gap-1">📰 ' + source + '</span>' +
                    '</div>' +
                '</div>' +
                '<div class="flex flex-wrap gap-1.5 mb-3.5">' +
                    '<span class="px-2 py-0.5 text-[10px] font-semibold rounded bg-red-100 text-red-600 border border-red-200">风险预警</span>' +
                    '<span class="px-2 py-0.5 text-[10px] font-medium rounded bg-[#F4F6FB] text-[#4A6495]">' + sector + '</span>' +
                '</div>' +
                '<div>' +
                    (articleTitle ? '<div class="mb-1.5 text-[14px] font-bold text-gray-800 leading-snug border-l-[3px] border-red-500 pl-2">' + articleTitle + '</div>' : '') +
                    ((eventDesc || reason) ? '<div class="mb-3.5 text-[13px] text-gray-600 leading-relaxed text-justify">' + (eventDesc || reason) + '</div>' : '') +
                '</div>' +
                (insight ? '<div class="mb-3 p-3 bg-red-50/80 rounded-xl border border-red-100/50">' +
                    '<div class="flex items-center gap-1.5 mb-1.5"><span class="text-[12px]">🛑</span><span class="text-[11px] font-extrabold text-red-700 tracking-wider">小贾风险洞察</span></div>' +
                    '<p class="text-[12px] text-red-800/90 leading-relaxed text-justify">' + insight + '</p>' +
                '</div>' : '') +
                
                // 🚀 双擎操作条：文案严肃化为“阅读原文”
                '<div class="flex items-center gap-2 mt-4 pt-3 border-t border-red-100/60">' +
                    '<button onclick="window.open(\'' + aiqichaUrl + '\', \'_blank\')" class="flex-1 py-2.5 bg-white text-red-600 border border-red-200 rounded-xl text-xs font-bold active:bg-red-50 transition-colors flex items-center justify-center gap-1"><span>🏢</span><span>查企业</span></button>' +
                    (link ? '<button onclick="window.open(\'' + link + '\', \'_blank\')" class="flex-1 py-2.5 bg-red-500 text-white rounded-xl text-xs font-bold active:bg-red-600 transition-colors flex items-center justify-center gap-1"><span>📰</span><span>阅读原文</span></button>' : '') +
                '</div>' +
            '</div>';
        }

        // ============================================
        // 🟢 发现企业卡片组件
        // ============================================
        function renderCompanyCard(company, index, isCompact) {
            var scoreColor = getScoreBadge(company.score || 50);
            var eventStyle = getEventTagStyle(company.event_type);
            var companyName = company.company || '未知企业';
            var sector = company.sector || '未知赛道';
            var location = company.location || '未知区域';
            var financing = company.financing || '';
            var source = company.source || '未知信源';
            var articleTitle = company.article_title || company.title || '';
            var eventDesc = company.event_desc || '';
            var insight = company.insight || company.summary || ''; 
            var link = company.link || '';
            var date = company.date || window.RadarData.manifest.today;
            
            var aiqichaUrl = 'https://aiqicha.baidu.com/s?q=' + encodeURIComponent(companyName);
            var safeId = 'company-' + encodeURIComponent(companyName);

            // ⚠️ 仅周报使用的紧凑目录模式，带精确制导锚点参数
            if (isCompact) {
                var cardClick = 'onclick="Router.navigate(\'/today?date=' + date + '&target=' + encodeURIComponent(companyName) + '\')"';
                return '<div class="relative bg-white rounded-xl shadow-sm border border-gray-100 p-3 mb-2.5 hover:shadow-md transition-all active:scale-[0.98] cursor-pointer" ' + cardClick + '>' +
                    (index ? '<div class="absolute -top-1.5 -left-1.5 w-5 h-5 rounded-full ' + scoreColor + ' flex items-center justify-center text-[10px] font-black shadow-sm border-2 border-white">' + index + '</div>' : '') +
                    '<div class="flex justify-between items-center gap-2 ml-1.5">' +
                        '<div class="flex-1 min-w-0">' + 
                            '<h3 class="text-[14px] font-bold text-gray-800 leading-snug truncate">' + companyName + '</h3>' +
                            '<div class="flex items-center gap-1.5 mt-1.5">' +
                                (company.event_type ? '<span class="px-1.5 py-0.5 text-[9px] font-semibold rounded ' + eventStyle + '">' + company.event_type + '</span>' : '') +
                                '<span class="text-[10px] text-gray-500 truncate">' + sector + '</span>' +
                            '</div>' +
                        '</div>' +
                        '<div class="flex items-center gap-2 shrink-0 pl-2 border-l border-gray-100">' +
                            '<span class="text-lg font-black leading-none ' + getScoreColor(company.score) + '">' + (company.score || 50) + '</span>' +
                            '<span class="text-gray-300 text-xs font-bold">查阅 →</span>' +
                        '</div>' +
                    '</div>' +
                '</div>';
            }
            
            // 🌟 沉浸阅读模式（主页、今日展示）
            var rankBadge = '';
            if (index !== null && index !== undefined) {
                rankBadge = '<div class="absolute -top-2.5 -left-2.5 w-7 h-7 rounded-full ' + scoreColor + ' flex items-center justify-center text-xs font-black shadow-sm border-2 border-white">' + index + '</div>';
            }
            
            return '<div id="' + safeId + '" class="relative bg-white rounded-2xl shadow-[0_2px_12px_-4px_rgba(6,81,237,0.08)] border border-gray-100/50 p-4 mb-5 transition-all duration-500">' +
                rankBadge +
                '<div class="mb-3 ml-2 flex justify-between items-start">' +
                    '<div>' +
                        '<h3 class="text-[17px] font-extrabold text-gray-800 leading-snug tracking-tight pr-2 mb-1.5">' + companyName + '</h3>' +
                        // 公众号来源高亮前置
                        '<span class="px-2 py-0.5 text-[10px] font-bold rounded bg-gray-50 border border-gray-100 text-gray-500 shadow-sm inline-flex items-center gap-1">📰 ' + source + '</span>' +
                    '</div>' +
                    '<div class="flex flex-col items-end shrink-0">' +
                        '<div class="flex items-baseline gap-0.5"><span class="text-2xl font-black leading-none tracking-tighter ' + getScoreColor(company.score) + '">' + (company.score || 50) + '</span></div>' +
                    '</div>' +
                '</div>' +
                '<div class="flex flex-wrap gap-1.5 mb-3.5">' +
                    (company.event_type ? '<span class="px-2 py-0.5 text-[10px] font-semibold rounded ' + eventStyle + '">' + company.event_type + '</span>' : '') +
                    '<span class="px-2 py-0.5 text-[10px] font-medium rounded bg-[#F4F6FB] text-[#4A6495]">' + sector + '</span>' +
                    '<span class="px-2 py-0.5 text-[10px] font-medium rounded bg-gray-50 text-gray-500">📍 ' + location + '</span>' +
                '</div>' +
                (articleTitle ? '<div class="mb-2 text-[14px] font-bold text-gray-800 leading-snug border-l-[3px] border-primary pl-2">' + articleTitle + '</div>' : '') +
                (eventDesc ? '<div class="mb-3.5 text-[13px] text-gray-600 leading-relaxed text-justify">' + eventDesc + '</div>' : '') +
                
                (financing && financing !== '-' ? '<div class="mb-3.5 px-3 py-2 bg-gray-50/80 rounded-lg border border-gray-100 flex items-start gap-2"><span class="text-[12px] pt-0.5">💰</span><div class="flex-1"><span class="text-[10px] text-gray-400 block mb-0.5 font-medium">融资/资本动态</span><span class="text-[12px] font-bold text-gray-700">' + financing + '</span></div></div>' : '') +
                
                (insight ? '<div class="mb-2 p-3 bg-gradient-to-br from-[#F5F7FF] to-[#EBF0FF] rounded-xl border border-indigo-100/50">' +
                    '<div class="flex items-center gap-1.5 mb-1.5"><span class="text-[12px]">💡</span><span class="text-[11px] font-extrabold text-[#3B4C8A] tracking-wider">小贾深度洞察</span></div>' +
                    '<p class="text-[12px] text-[#4A5D9A] leading-relaxed text-justify">' + insight + '</p>' +
                '</div>' : '') +
                
                // 🚀 双擎操作条：文案严肃化
                '<div class="flex items-center gap-2 mt-4 pt-3 border-t border-gray-100/80">' +
                    '<button onclick="window.open(\'' + aiqichaUrl + '\', \'_blank\')" class="flex-1 py-2.5 bg-[#F4F6FB] text-[#4A6495] rounded-xl text-xs font-bold active:bg-indigo-100 transition-colors flex items-center justify-center gap-1"><span>🏢</span><span>查企业</span></button>' +
                    (link ? '<button onclick="window.open(\'' + link + '\', \'_blank\')" class="flex-1 py-2.5 bg-gray-800 text-white rounded-xl text-xs font-bold active:bg-gray-700 transition-colors flex items-center justify-center gap-1"><span>📰</span><span>阅读原文</span></button>' : '') +
                '</div>' +
            '</div>';
        }

        // ============================================
        // 视图渲染器
        // ============================================
        var Views = {
            home: function(data) {
                var todaySummary = data.summary.today;
                var top3 = todaySummary.top3 || [];
                var updates = data.recent_updates || [];
                var negCount = todaySummary.negative_count || 0;
                
                var updateHtml = '';
                if (updates.length > 0) {
                    var latest = updates[0];
                    updateHtml = '<div class="mb-4 bg-white px-3 py-2.5 rounded-xl shadow-sm border border-orange-100 flex items-center justify-between animate-fade-in"><div class="flex items-center gap-2"><span class="relative flex h-2 w-2"><span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-orange-400 opacity-75"></span><span class="relative inline-flex rounded-full h-2 w-2 bg-orange-500"></span></span><span class="text-[12px] font-bold text-orange-600">' + latest.title + '</span></div><span class="text-[11px] text-gray-500 truncate max-w-[60%]">' + latest.highlight + '</span></div>';
                }
                
                // 彻底修正的严肃化文案：发现企业、风险预警、融资/IPO
                return '<div class="animate-fade-in">' +
                    updateHtml +
                    '<div class="bg-gradient-to-br from-[#FF6B35] to-[#FF8C61] rounded-2xl p-5 text-white mb-6 shadow-md">' +
                        '<div class="flex items-center justify-between mb-4"><div class="flex items-center gap-1.5"><span class="text-lg">⚡️</span><span class="text-sm font-extrabold tracking-wide">最新雷达快报</span></div><div class="text-[11px] font-bold bg-white/20 px-2.5 py-1 rounded-md">' + data.today + '</div></div>' +
                        '<div class="grid grid-cols-3 gap-4">' +
                            '<div class="text-center"><div class="text-3xl font-black">' + todaySummary.total_companies + '</div><div class="text-[11px] font-medium opacity-80 mt-1">发现企业</div></div>' +
                            '<div class="text-center"><div class="text-3xl font-black ' + (negCount > 0 ? 'text-red-100' : '') + '">' + negCount + '</div><div class="text-[11px] font-medium opacity-80 mt-1 flex items-center justify-center gap-0.5">' + (negCount > 0 ? '🚨 ' : '') + '风险预警</div></div>' +
                            '<div class="text-center"><div class="text-3xl font-black">' + todaySummary.financing_count + '</div><div class="text-[11px] font-medium opacity-80 mt-1">融资/IPO</div></div>' +
                        '</div>' +
                    '</div>' +
                    
                    '<div class="mb-6"><div class="flex items-center justify-between mb-4 px-1"><h2 class="text-[15px] font-extrabold text-gray-800 tracking-tight flex items-center gap-1.5">🏆 重点情报精读</h2><span class="text-xs text-gray-400">滑动直阅</span></div>' +
                    (top3.length > 0 ? top3.map(function(company, index) { return renderCompanyCard(company, index + 1, false); }).join('') :
                        '<div class="text-center py-12 bg-white rounded-2xl shadow-sm border border-gray-50"><span class="text-5xl mb-3 block opacity-30">📭</span><p class="text-gray-400 text-sm font-medium">今日雷达暂无捕获</p></div>') +
                    '</div>' +
                '</div>';
            },
            
            today: function(data, date) {
                var targetDate = date || data.today;
                var companies = data.targets || [];
                var negatives = data.negatives || []; 
                companies.sort(function(a, b) { return (b.score || 0) - (a.score || 0); });
                
                var html = '<div class="animate-fade-in">' +
                    '<div class="flex items-center justify-between mb-5 px-1">' +
                        '<div><h2 class="text-[18px] font-extrabold text-gray-800 tracking-tight">📰 完整情报池</h2><p class="text-[11px] text-gray-500 font-medium mt-1">' + targetDate + ' · 共收录 ' + (companies.length + negatives.length) + ' 份深度研报</p></div>' +
                    '</div>';
                    
                if (negatives.length > 0) {
                    html += '<div class="mb-6">' +
                        '<h3 class="text-[13px] font-extrabold text-red-600 mb-3 flex items-center gap-1.5 px-1"><span class="text-base">🚨</span> 风险与负面排雷 (' + negatives.length + ')</h3>' +
                        '<div class="space-y-4">' +
                        negatives.map(function(item) { return renderNegativeCard(item, false); }).join('') +
                        '</div></div>';
                }

                html += '<div>' +
                    (negatives.length > 0 && companies.length > 0 ? '<h3 class="text-[13px] font-extrabold text-gray-800 mb-3 px-1 flex items-center gap-1.5"><span class="text-base">✨</span> 高潜企业动态 (' + companies.length + ')</h3>' : '') +
                    '<div class="space-y-5">' +
                    (companies.length > 0 ? companies.map(function(company, index) { return renderCompanyCard(company, index + 1, false); }).join('') :
                        '<div class="text-center py-16 bg-white rounded-2xl shadow-sm"><span class="text-5xl mb-4 block opacity-30">☕️</span><p class="text-gray-400 text-sm font-medium">这天没有企业动态，休息一下吧</p></div>') +
                    '</div></div>';
                    
                html += '</div>';
                return html;
            },
            
            calendar: function(data) {
                var availableDates = data.available_dates || [];
                var today = data.today;
                var now = new Date(today.replace(/-/g, '/'));
                var year = now.getFullYear();
                var month = now.getMonth();
                var firstDay = new Date(year, month, 1);
                var lastDay = new Date(year, month + 1, 0);
                var startDay = firstDay.getDay();
                startDay = startDay === 0 ? 7 : startDay;
                
                var dateMap = {};
                for (var i = 0; i < availableDates.length; i++) {
                    dateMap[availableDates[i].date] = JSON.parse(JSON.stringify(availableDates[i])); 
                }
                
                var weeklyNegatives = data.weekly_negatives || [];
                for (var n = 0; n < weeklyNegatives.length; n++) {
                    var negDate = weeklyNegatives[n].date;
                    if (negDate) {
                        if (!dateMap[negDate]) {
                            dateMap[negDate] = { date: negDate, count: 0, hasData: true, negative_count: 0 };
                        }
                        dateMap[negDate].negative_count = (dateMap[negDate].negative_count || 0) + 1;
                    }
                }
                
                var calendarDays = [];
                for (var j = 1; j < startDay; j++) { calendarDays.push({ type: 'empty' }); }
                for (var day = 1; day <= lastDay.getDate(); day++) {
                    var dateStr = year + '-' + String(month + 1).padStart(2, '0') + '-' + String(day).padStart(2, '0');
                    var dateInfo = dateMap[dateStr];
                    calendarDays.push({
                        type: 'day', day: day, date: dateStr,
                        hasData: !!dateInfo, count: dateInfo ? dateInfo.count : 0,
                        hasHighScore: dateInfo ? dateInfo.has_high_score : false,
                        negativeCount: dateInfo ? (dateInfo.negative_count || 0) : 0,
                        isToday: dateStr === today
                    });
                }
                
                var weekDays = ['一', '二', '三', '四', '五', '六', '日'];
                var monthPrefix = year + '-' + String(month + 1).padStart(2, '0');
                var monthDays = 0, monthCompanies = 0;
                for (var k = 0; k < availableDates.length; k++) {
                    if (availableDates[k].date.indexOf(monthPrefix) === 0) {
                        monthDays++; monthCompanies += availableDates[k].count;
                    }
                }
                
                return '<div class="animate-fade-in">' +
                    '<div class="mb-4 px-1"><h2 class="text-xl font-extrabold text-gray-800 tracking-tight">🗓️ 发现日历</h2><p class="text-[11px] text-gray-500 font-medium mt-0.5">' + year + '年' + (month + 1) + '月</p></div>' +
                    '<div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-4 mb-4">' +
                        '<div class="grid grid-cols-7 gap-1 mb-2">' + weekDays.map(function(d) { return '<div class="text-center text-[11px] font-bold text-gray-400 py-1">' + d + '</div>'; }).join('') + '</div>' +
                        '<div class="grid grid-cols-7 gap-1.5">' + calendarDays.map(function(cell) {
                            if (cell.type === 'empty') return '<div class="aspect-square"></div>';
                            
                            // 优雅防呆：有数据才赋予button和点击事件，没数据就是个纯净的div
                            var isClickable = cell.hasData;
                            var cellTag = isClickable ? 'button' : 'div';
                            var cellClick = isClickable ? 'onclick="Router.navigate(\'/today?date=' + cell.date + '\')"' : '';
                            
                            var cellClass = 'relative aspect-square rounded-xl flex flex-col items-center justify-center text-sm transition-all ';
                            if (isClickable) cellClass += 'active:scale-[0.85] cursor-pointer ';
                            
                            var negativeBadge = cell.negativeCount > 0 ? '<span class="absolute top-[3px] right-[3px] flex h-1.5 w-1.5"><span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-red-400 opacity-75"></span><span class="relative inline-flex rounded-full h-1.5 w-1.5 bg-red-500"></span></span>' : '';
                            
                            if (cell.isToday) cellClass += 'bg-gradient-to-br from-orange-400 to-orange-500 text-white font-bold shadow-md ';
                            else if (cell.hasData) cellClass += cell.hasHighScore ? 'bg-red-50 text-red-600 font-bold border border-red-200 ' : 'bg-blue-50 text-blue-600 border border-blue-100 ';
                            else cellClass += 'bg-gray-50 text-gray-300 ';
                            
                            return '<' + cellTag + ' ' + cellClick + ' class="' + cellClass + '">' +
                                negativeBadge +
                                '<span class="text-[15px]">' + cell.day + '</span>' +
                                (cell.hasData ? '<span class="text-[9px] mt-0.5 font-medium">' + cell.count + '家</span>' : '') +
                            '</' + cellTag + '>';
                        }).join('') + '</div>' +
                    '</div>' +
                    
                    '<div class="flex items-center justify-center gap-4 px-1 mb-6"><span class="flex items-center gap-1 text-[10px] font-medium text-gray-500"><span class="w-2 h-2 rounded-full bg-red-500 shadow-[0_0_2px_rgba(239,68,68,0.8)]"></span> 含风险预警</span><span class="flex items-center gap-1 text-[10px] font-medium text-gray-500"><span class="w-2.5 h-2.5 rounded-sm bg-red-50 border border-red-200"></span> 含高分精选</span></div>' +
                    
                    '<div class="grid grid-cols-2 gap-3 mb-4">' +
                        '<div class="bg-white rounded-2xl p-4 shadow-sm border border-gray-100 flex items-center gap-3"><div class="w-10 h-10 rounded-xl bg-purple-50 flex items-center justify-center text-purple-600 text-lg">📈</div><div><div class="text-xl font-black text-gray-800">' + monthDays + '<span class="text-xs font-normal text-gray-400 ml-1">天</span></div><div class="text-[10px] text-gray-500 font-medium mt-0.5">本月收录天数</div></div></div>' +
                        '<div class="bg-white rounded-2xl p-4 shadow-sm border border-gray-100 flex items-center gap-3"><div class="w-10 h-10 rounded-xl bg-pink-50 flex items-center justify-center text-pink-600 text-lg">🏢</div><div><div class="text-xl font-black text-gray-800">' + monthCompanies + '<span class="text-xs font-normal text-gray-400 ml-1">家</span></div><div class="text-[10px] text-gray-500 font-medium mt-0.5">本月扫描总数</div></div></div>' +
                    '</div>' +
                '</div>';
            },
            
            weekly: function(data) {
                var weekSummary = data.summary.week;
                var top10 = data.weekly_top10 || [];
                var topSectors = weekSummary.top_sectors || [];
                var colors = ['from-red-400 to-orange-500', 'from-blue-400 to-cyan-500', 'from-green-400 to-emerald-500'];
                
                var weeklyNegatives = data.weekly_negatives || [];
                var weeklyNegCount = weekSummary.negative_count !== undefined ? weekSummary.negative_count : weeklyNegatives.length;
                
                // 优雅的历史周报选择器UI
                var weekOptions = generateWeekOptions(weekSummary.week_id);
                var selectorHtml = '<div class="relative inline-block ml-2">' +
                    '<select class="absolute inset-0 w-full h-full opacity-0" onchange="alert(\'历史归档：需后端在/data/weekly/目录下生成对应的 \'+ this.value +\'.json，后续版本可直连切换。\'); this.selectedIndex = 0;">' +
                    weekOptions +
                    '</select>' +
                    '<div class="flex items-center gap-1 bg-white/60 px-2 py-0.5 rounded border border-gray-200 text-gray-600 shadow-sm active:bg-gray-100 transition-colors">' +
                    '<span class="text-[11px] font-bold">' + weekSummary.week_id + ' (本周)</span><span class="text-[8px]">▼</span>' +
                    '</div></div>';
                
                return '<div class="animate-fade-in">' +
                    '<div class="mb-4 px-1 flex items-center justify-between">' + 
                        '<div><h2 class="text-[18px] font-extrabold text-gray-800 tracking-tight">📊 周期财报</h2><div class="mt-1.5 flex items-center"><p class="text-[11px] text-gray-500 font-medium">归档区间: </p>' + selectorHtml + '</div></div>' +
                    '</div>' +
                    
                    '<div class="bg-gradient-to-br from-[#764ba2] to-[#667eea] rounded-2xl p-5 text-white mb-6 shadow-md">' +
                        '<div class="text-[10px] font-bold opacity-70 mb-4 tracking-widest uppercase">Weekly Summary</div>' +
                        '<div class="grid grid-cols-4 gap-2">' +
                            '<div class="flex flex-col items-center"><div class="text-2xl font-black">' + weekSummary.total_companies + '</div><div class="text-[10px] opacity-80 mt-1">发现企业</div></div>' +
                            '<div class="flex flex-col items-center"><div class="text-2xl font-black">' + (weekSummary.financing_count + weekSummary.ipo_count) + '</div><div class="text-[10px] opacity-80 mt-1">融资/IPO</div></div>' +
                            '<div class="flex flex-col items-center"><div class="text-2xl font-black">' + topSectors.length + '</div><div class="text-[10px] opacity-80 mt-1">活跃赛道</div></div>' +
                            '<div class="flex flex-col items-center"><div class="text-2xl font-black ' + (weeklyNegCount > 0 ? 'text-red-200' : '') + '">' + weeklyNegCount + '</div><div class="text-[10px] opacity-80 mt-1 flex items-center gap-0.5">' + (weeklyNegCount > 0 ? '🚨 ' : '') + '风险预警</div></div>' +
                        '</div>' +
                    '</div>' +
                    
                    (weeklyNegatives.length > 0 ? '<div class="mb-6"><div class="flex items-center justify-between mb-3 px-1"><h3 class="text-[14px] font-extrabold text-red-600 tracking-tight flex items-center gap-1.5">🚨 本周风险目录</h3></div><div class="space-y-0">' +
                        weeklyNegatives.map(function(item) { return renderNegativeCard(item, true); }).join('') +
                    '</div></div>' : '') +
                    
                    (topSectors.length > 0 ? '<div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-4 mb-6"><h3 class="text-[13px] font-extrabold text-gray-800 mb-4 flex items-center gap-1.5"><span class="text-base">🏷️</span> 赛道热度 TOP3</h3><div class="space-y-3.5">' +
                        topSectors.map(function(sector, index) {
                            var percentage = Math.round((sector.count / weekSummary.total_companies) * 100) || 0;
                            var barColor = colors[index] || 'from-gray-300 to-gray-400';
                            return '<div><div class="flex items-center justify-between mb-1.5"><span class="text-xs font-bold text-gray-700">' + (index + 1) + '. ' + sector.sector + '</span><span class="text-[10px] font-medium text-gray-500">' + sector.count + '家 (' + percentage + '%)</span></div>' +
                                '<div class="h-1.5 bg-gray-100 rounded-full overflow-hidden"><div class="h-full bg-gradient-to-r ' + barColor + ' rounded-full" style="width: ' + percentage + '%"></div></div></div>';
                        }).join('') + '</div></div>' : '') +
                        
                    '<div class="mb-6"><div class="flex items-center justify-between mb-3 px-1"><h3 class="text-[14px] font-extrabold text-gray-800 tracking-tight flex items-center gap-1.5">🎖️ 本周精选榜单索引</h3></div>' +
                    (top10.length > 0 ? top10.map(function(company, index) { return renderCompanyCard(company, index + 1, true); }).join('') :
                        '<div class="text-center py-10 bg-white rounded-2xl shadow-sm"><span class="text-4xl mb-3 block opacity-50">📭</span><p class="text-gray-400 text-sm font-medium">本周暂无榜单数据</p></div>') +
                    '</div>' +
                '</div>';
            },
            
            loading: function() {
                return '<div class="animate-fade-in flex flex-col items-center justify-center py-32"><div class="w-10 h-10 border-4 border-indigo-100 border-t-indigo-500 rounded-full animate-spin mb-4"></div><p class="text-gray-400 text-[10px] font-bold tracking-widest uppercase">Syncing Data...</p></div>';
            },
            
            error: function(msg) {
                return '<div class="animate-fade-in text-center py-16 bg-red-50 rounded-2xl border border-red-100"><span class="text-5xl mb-4 block">⚠️</span><h2 class="text-base font-bold text-red-600 mb-2">雷达链路异常</h2><p class="text-red-400 text-xs mb-6 px-4">' + msg + '</p><button onclick="location.reload()" class="px-6 py-2.5 bg-red-500 text-white text-xs font-bold rounded-xl active:scale-95 transition-transform shadow-sm">重新连接</button></div>';
            }
        };

        var Router = {
            getRoute: function() {
                var hash = window.location.hash.slice(1) || '/';
                return hash.split('?')[0];
            },
            getQueryParams: function() {
                var hash = window.location.hash || '';
                var parts = hash.split('?');
                var queryString = parts[1] || '';
                var params = {};
                if (queryString) {
                    var pairs = queryString.split('&');
                    for (var i = 0; i < pairs.length; i++) {
                        var pair = pairs[i].split('=');
                        params[decodeURIComponent(pair[0])] = decodeURIComponent(pair[1] || '');
                    }
                }
                return params;
            },
            updateNavActive: function() {
                var route = this.getRoute();
                var navItems = document.querySelectorAll('.nav-item');
                for (var i = 0; i < navItems.length; i++) {
                    var item = navItems[i];
                    var itemRoute = item.getAttribute('data-route');
                    if (itemRoute === route || (route === '' && itemRoute === '/')) {
                        item.classList.add('active');
                    } else {
                        item.classList.remove('active');
                    }
                }
            },
            navigate: function(route) {
                window.location.hash = route;
            }
        };

        function loadDailyData(date) {
            return new Promise(function(resolve, reject) {
                fetch('./data/daily/' + date + '.json')
                    .then(function(response) {
                        if (!response.ok) throw new Error('未能获取 ' + date + ' 的雷达扫描数据');
                        return response.json();
                    })
                    .then(function(data) { resolve(data); })
                    .catch(function(error) { reject(error); });
            });
        }

        function renderPage() {
            var appContent = document.getElementById('app-content');
            Router.updateNavActive();
            window.scrollTo({ top: 0, behavior: 'smooth' });
            
            if (!window.RadarData.loaded) {
                appContent.innerHTML = Views.loading();
                return;
            }
            if (window.RadarData.error) {
                appContent.innerHTML = Views.error(window.RadarData.error.message);
                return;
            }
            
            var route = Router.getRoute();
            var params = Router.getQueryParams();
            var manifest = window.RadarData.manifest;
            
            switch (route) {
                case '/':
                    appContent.innerHTML = Views.home(manifest);
                    break;
                case '/today':
                    var targetDate = params.date || manifest.today;
                    appContent.innerHTML = Views.loading();
                    loadDailyData(targetDate).then(function(dailyData) {
                        appContent.innerHTML = Views.today(dailyData, targetDate);
                        
                        // 精确制导：页面渲染后平滑滚动到目标卡片并高亮提示
                        setTimeout(function() {
                            if (params.target) {
                                var targetEl = document.getElementById('company-' + params.target);
                                if (targetEl) {
                                    targetEl.scrollIntoView({ behavior: 'smooth', block: 'center' });
                                    targetEl.classList.add('target-highlight');
                                    setTimeout(function() {
                                        targetEl.classList.remove('target-highlight');
                                    }, 2000);
                                }
                            }
                        }, 150);
                    }).catch(function(error) {
                        appContent.innerHTML = Views.error(error.message);
                    });
                    break;
                case '/calendar':
                    appContent.innerHTML = Views.calendar(manifest);
                    break;
                case '/weekly':
                    appContent.innerHTML = Views.weekly(manifest);
                    break;
                default:
                    appContent.innerHTML = Views.error('页面未找到');
            }
        }

        function initApp() {
            var appContent = document.getElementById('app-content');
            
            fetch('./data/manifest.json?t=' + Date.now())
                .then(function(response) {
                    if (!response.ok) throw new Error('雷达配置加载失败，请检查网络');
                    return response.json();
                })
                .then(function(manifestData) {
                    window.RadarData.manifest = manifestData;
                    
                    return loadDailyData(manifestData.today).then(function(dailyData) {
                        var targets = dailyData.targets || [];
                        var negatives = dailyData.negatives || [];
                        
                        if (targets.length > 0 || negatives.length > 0) {
                            var finCount = 0;
                            for(var i=0; i<targets.length; i++) {
                                if(targets[i].event_type === '融资' || targets[i].event_type === 'IPO') finCount++;
                            }
                            var sorted = targets.slice().sort(function(a, b) { return (b.score || 0) - (a.score || 0); });
                            
                            window.RadarData.manifest.summary.today = {
                                date: manifestData.today,
                                total_companies: targets.length,
                                negative_count: negatives.length,
                                financing_count: finCount,
                                top3: sorted.slice(0, 5)
                            };
                            
                            if (window.RadarData.manifest.recent_updates && window.RadarData.manifest.recent_updates.length > 0) {
                                if (window.RadarData.manifest.recent_updates[0].title.indexOf('0') !== -1) {
                                    window.RadarData.manifest.recent_updates[0] = {
                                        title: '截获 ' + targets.length + ' 份高潜情报',
                                        highlight: sorted.length > 0 ? '最高分标的: ' + sorted[0].company : (negatives.length > 0 ? '警告：今日检出 ' + negatives.length + ' 处风险' : '')
                                    };
                                }
                            }
                            
                            var targetDateObj = null;
                            window.RadarData.manifest.available_dates = window.RadarData.manifest.available_dates || [];
                            for(var j=0; j<window.RadarData.manifest.available_dates.length; j++) {
                                if(window.RadarData.manifest.available_dates[j].date === manifestData.today) {
                                    targetDateObj = window.RadarData.manifest.available_dates[j];
                                    break;
                                }
                            }
                            
                            if (targetDateObj) {
                                targetDateObj.count = targets.length;
                                targetDateObj.has_high_score = sorted[0] && sorted[0].score >= 80;
                                targetDateObj.max_score = sorted[0] ? sorted[0].score : 0;
                                targetDateObj.negative_count = negatives.length; 
                            } else {
                                window.RadarData.manifest.available_dates.push({
                                    date: manifestData.today,
                                    count: targets.length,
                                    has_high_score: sorted[0] && sorted[0].score >= 80,
                                    max_score: sorted[0] ? sorted[0].score : 0,
                                    negative_count: negatives.length, 
                                    week_id: manifestData.current_week || ''
                                });
                            }
                        }
                    }).catch(function(err) {
                        console.log("后台静默核对失败，走默认缓存配置");
                    });
                })
                .then(function() {
                    window.RadarData.loaded = true;
                    window.addEventListener('hashchange', renderPage);
                    renderPage();
                })
                .catch(function(error) {
                    window.RadarData.error = error;
                    appContent.innerHTML = Views.error(error.message);
                });
        }

        document.addEventListener('DOMContentLoaded', initApp);
    </script>
</body>
</html>
